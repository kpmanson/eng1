shadow:{label:"The closing challenge — the speaker's final thought about beliefs",
text:"When you walked in here today, many of you didn't believe you could draw. How many other beliefs and limiting thoughts do we all carry around with us everyday? If we did challenge those beliefs and think differently about them, apart from drawing, what else would be possible for us all? Thank you very much."},
discuss:[
"The speaker says many people believe ‘I can't draw’ when it is really just a belief. What is one thing you have always told yourself you ‘can't’ do? Where did that belief come from?",
"Do you agree that self-belief matters more than natural talent for learning many skills? Why or why not?",
"The stroke patients gained real confidence from a simple drawing lesson. What small success has ever boosted your own confidence?"
],
writeCore:{task:"Graham Shaw argues that many people ‘can't’ do things simply because they believe they can't. Write a paragraph (100–150 words) describing one limiting belief you (or someone you know) once held, and how it could be challenged. Give at least one reason and one example.",
frames:["In his talk, Graham Shaw argues that ...","One limiting belief I have carried is that I ‘can't’ ...","This belief probably came from ...","However, like the stroke patients who learned to draw, I could challenge it by ...","If I stopped believing this, I might be able to ..."]},
challenge:{
paraphrase:[
{src:"When people say they can't draw, I think it's more to do with beliefs rather than talent and ability.",
model:"Model: In my view, people who claim they cannot draw are usually held back by what they believe about themselves, not by any real lack of skill or natural gift."},
{src:"How many other beliefs and limiting thoughts do we all carry around with us everyday?",
model:"Model: Every single day, each of us carries around plenty of other self-doubts and beliefs that hold us back — and we rarely stop to question them."}
],
backtrans:{zh:"你們也許聽過「失語症」，有時又叫「言語障礙」。關鍵在於，它會影響他們溝通的能力。舉例來說，他們可能在閱讀、書寫、說話或理解方面有困難。這可以是一種讓人相當孤立的情況；它可以非常、非常令人沮喪，甚至導致失去信心。",
en:"You might have heard of aphasia, sometimes called dysphasia. The key thing is it affects their ability to communicate. So, for example, they might have trouble reading, writing, speaking, or understanding. It can be quite an isolating condition; it can be very, very frustrating and can lead to a loss of confidence."},
essay:{task:"Your school magazine is running a feature called ‘Believe You Can’. Write an article (about 400 words) encouraging fellow students to challenge one limiting belief they hold about themselves — for example ‘I can't draw’, ‘I'm hopeless at Maths’, or ‘I'm just not creative’. Explain why such beliefs form and suggest practical ways to overcome them, using ideas from Graham Shaw's talk.",
tips:["Open with a hook: name a belief many students share, then question whether it is really true.","Borrow from the talk: ‘it's more to do with beliefs rather than talent’, ‘just have a go’, ‘little variations’, ‘builds their confidence’.","Structure: catchy title → the problem (limiting beliefs) → why they form → 2–3 practical tips → an encouraging closing line."]}
},
summary:{
bigIdeaEn:"Most of the time, ‘I can't’ is not about talent — it is a belief, and beliefs can be challenged and changed.",
bigIdeaZh:"很多時候，「我不會」與天賦無關——那只是一種信念，而信念是可以被挑戰和改變的。",
takeaways:[
{en:"① Skills like drawing are learnable — follow a simple sequence and make little variations.",zh:"畫畫這類技能是可以學會的——跟着簡單的順序，再做些小變化。"},
{en:"② Self-belief and a willingness to ‘have a go’ matter more than natural talent.",zh:"自我信念和肯「放膽一試」的態度，比天賦更重要。"},
{en:"③ We all carry limiting beliefs — question them, and more becomes possible.",zh:"我們都帶着自我設限的信念——質疑它們，更多的可能便會打開。"}
],
quoteEn:"If we did challenge those beliefs and think differently about them, apart from drawing, what else would be possible for us all?",
quoteZh:"如果我們真的去挑戰那些信念、換個角度去想，那麼除了畫畫以外，對我們大家來說還有甚麼是可能的呢？"
},
script:[
["Hi. I've got a question for you: how many people here would say they can draw? I think we've got about one or two percent of the hands going up, and it's interesting, isn't it? It's a little bit like people think of spelling or singing. They think, “You can either do it, or you can't.” But I think you can. Because when people say they can't draw, I think it's more to do with beliefs rather than talent and ability.",
"嗨，我有一個問題想問大家：在座有多少人敢說自己會畫畫？我看舉手的大概只有百分之一或二，很有意思，對不對？這有點像人們看待串字或唱歌一樣。他們會想：「你要麼做得到，要麼做不到。」但我認為你們一定做得到。因為當人們說自己不會畫畫時，我認為這更多與他們的信念有關，而不是天賦和能力。"],
["So I think when you say you can't draw, that's just an illusion, and today I'd like to prove that to you. When I say “draw”, I'm not saying we're all going to draw like Michelangelo. We are not going to be painting the Sistine Chapel's ceiling. But would you be happy if, by the end of this session, you could draw pictures a little bit like this?",
"所以我認為，當你說自己不會畫畫時，那只是一種錯覺，今天我想向你們證明這一點。當我說「畫畫」時，我不是說我們大家都要畫得像米開朗基羅那樣。我們不會去畫西斯汀禮拜堂的天花板。但如果在這節講座結束時，你們能畫出有點像這樣的圖畫，你們會不會很高興呢？"],
["Or even a little bit like this? Actually, there are only two things you need to do to be able to achieve this. One is have an open mind. Are you up for that?",
"又或者有點像這樣的畫？其實，要做到這一點，你們只需要做兩件事。第一，就是要保持開放的心態。你們願意嗎？"],
["Yes! And two, just be prepared to have a go. So grab a pen and a piece of paper. OK, so here's how it's going to work: I'll show you the first cartoon we're going to do, so just watch to begin with. Here we go. Just watching. That's going to be our first cartoon.",
"太好了！第二，就是要準備好放膽一試。所以，拿一支筆和一張紙出來。好，接下來是這樣的：我會先給大家看看我們要畫的第一個卡通，一開始你們只管看着就好。來了，先看着。這就是我們要畫的第一個卡通。"],
["It's a character called Spike. I'd like you to draw along with me. I'll draw the first line, you draw, and when you've done that, look up, and I'll know you're ready for the next line. Okay, here we go.",
"這是一個叫史派克（Spike）的卡通人物。我想請你們跟着我一起畫。我畫第一筆，你們跟着畫，畫完之後抬起頭來，我就知道你們準備好畫下一筆了。好，我們開始。"],
["Start with the nose. Now the eyes. They're like 66s or speech marks. That's it. Next, the mouth. Nice, big smile. Now, over here, the ear. Next, some spiky hair. Next, put the pen to the left to the mouth, little line like that. Pen under the ear, drop a line like that. Pen to the left of the neck, top of the T-shirt. Line to the left, line to the right. Just hold your drawings up and show everyone. How are we all doing? OK. OK, fantastic.",
"先由鼻子開始。現在畫眼睛，看起來就像兩個「66」或者引號。就這樣。接着畫嘴巴，漂亮的、大大的笑容。現在，在這邊，畫耳朵。然後，畫些豎起的頭髮。接着，把筆放到嘴巴的左邊，輕輕一筆。筆放到耳朵下方，往下畫一筆。筆放到頸的左邊，畫T恤的領口。左邊一筆，右邊一筆。把你們的畫舉起來給大家看看。我們畫得怎麼樣？好。好，太棒了！"],
["So, it looks like you've just learned to draw one cartoon, but you've actually learned more than that; you've learned a sequence that would enable you to draw hundreds and thousands of different cartoons, because we're just going to do little variations on that sequence. Have a go at this.",
"這樣看來，你們好像只是學會了畫一個卡通，但其實你們學到的遠不止於此；你們學會了一套順序，讓你們能夠畫出成千上萬種不同的卡通，因為我們只是在這套順序上做些小小的變化而已。試試這個。"],
["Draw along with me. Nose. Eyes. Smile. That's it. Now some hair. Pen to the left of the mouth, under the hair, little V-shape for the top, line to the left, line to the right. So we've got another character. Let's call her Thelma. So, we've got Spike and Thelma.",
"跟着我畫。鼻子。眼睛。笑容。就這樣。現在畫些頭髮。筆放到嘴巴左邊、頭髮下面，畫一個小小的V字形做上衣領口，左邊一筆，右邊一筆。這樣我們就有了另一個角色。我們叫她塞爾瑪（Thelma）吧。現在，我們有史派克和塞爾瑪了。"],
["Let's try another one. Here we go. Another little variation. You're getting the idea. Starting with the nose. But this time we'll change the eyes slightly. Look, two circles together like that. That's it. Then, two little dots in for the eyes. And this time we'll change the mouth slightly. Watch. Little circle colored in there. Have a go at that. Next, the ear.",
"我們再試一個。來吧。又是一點小變化。你們開始明白了。從鼻子開始。不過這次我們把眼睛稍微改一下。看，兩個圓圈這樣連在一起。就這樣。然後，在裏面點兩個小點做眼睛。這次我們也把嘴巴稍微改一下。看着，在那裏塗一個實心的小圓圈。試試看。接着，畫耳朵。"],
["Now, we'll have some fun with the hair, watch. Nice curly hair. Then same thing: pen to the left to the mouth, little line like that. Under the ear, drop a line. Top of the T-shirt. Line to the left, line to the right. I think we'll call him Jeff.",
"現在，我們在頭髮上玩點花樣，看着。漂亮的曲髮。然後還是一樣：筆放到嘴巴左邊，輕輕一筆。耳朵下方，往下一筆。畫T恤的領口。左邊一筆，右邊一筆。我想，我們可以叫他杰夫（Jeff）。"],
["We'll do one more. One more go. Here we go. You're getting the idea. So we'll start with a nose again. Notice we're doing little variations. Now we'll change the eyes, so we've got them apart. We'll put some little dots in like that. Next, the mouth slightly different. Let's put a little V-shape like that. Triangle. And a little line across, and we'll just color this a little bit in. Now, watch this bit carefully; some hair, watch. Here we go, little line like that. Next, a bit more there. And watch, a couple of triangles to make a little bow. Triangle at the bottom, rest of the hair. Pen to the left of the mouth again. You get the idea. Drop a line for the neck. Now the V-shape. Line to the left, line to the right. There we go. Let's call her Pam.",
"我們再畫一個。再來一次。開始。你們都明白了。所以我們還是從鼻子開始。注意，我們在做些小變化。現在我們改一下眼睛，把兩隻眼睛分開。像這樣點些小點。接着，嘴巴稍微不同。畫一個小小的V字形，一個三角形。再畫一道橫線，然後把這裏塗上一點顏色。現在，仔細看這一部分；畫些頭髮，看着。來了，輕輕這樣一筆。接着，這邊再多一點。再看，畫一對三角形，做成一個小蝴蝶結。底下一個三角形，其餘的就是頭髮。筆再次放到嘴巴左邊。你們都懂了。往下一筆畫頸。現在畫V字形領口。左邊一筆，右邊一筆。完成了。我們叫她帕姆（Pam）吧。"],
["So you've done... So you've done four cartoons. You can have a little rest now. Take a rest. You're getting the idea. All we're doing is little variations. I'll just demonstrate a couple to you. We could go on all day, couldn't we? You could do someone looking unhappy, a bit like that, or you could experiment with, perhaps, someone who is... just draw a straight line, someone looking a bit fed up. Or perhaps, you could do anything you like, really, just try things out. Look at this. Little squiggle. There we are. So, all sorts of things we could do.",
"這樣，你們已經……你們已經畫了四個卡通。現在可以稍微休息一下。休息一下。你們慢慢明白了，我們所做的只是些小變化而已。我再示範一兩個給你們看。我們可以畫一整天，對不對？你們可以畫一個看起來不開心的人，有點像這樣；或者你們可以試試，也許畫一個……只畫一條直線，一個有點厭煩的樣子。又或者，你們可以隨心所欲，真的，儘管試試看。看這個，一條彎彎曲曲的線。就這樣。所以，我們可以畫各種各樣的東西。"],
["Actually, one more I'll let you do, one more idea. This is a great little technique. Have a go at this: people with glasses on. Just draw a nose a bit like Spike's. Next, draw some frames, so two circles like that with a little bit in between. Now, just put some dots inside for the eyes like that.",
"其實，我再讓你們畫一個，還有一個點子。這是一個很棒的小技巧。試試這個：戴眼鏡的人。先畫一個有點像史派克的鼻子。接着，畫眼鏡框，兩個這樣的圓圈，中間連着一小段。現在，只要在裏面點些點做眼睛，就這樣。"],
["Next, the ear. So it's little bit like we did before, but this time we'll join up the frames. That's it. Watch this bit. And this bit I really like. Watch. And then, little bit there. Pencil under the mustache, line down, top of the shirt, left and right. So there we have it.",
"接着，畫耳朵。這跟我們之前畫的有點像，只是這次我們要把眼鏡框連起來。就這樣。看着這一部分。而這一部分我真的很喜歡。看着。然後，這裏再一點。鉛筆放到鬍子下方，往下一筆，畫衣領，左邊、右邊。這樣就完成了。"],
["We could carry on, couldn't we? Hopefully, we've done enough to convince you that in fact we can all draw. And not just people here. I've worked with... I'm going to give you three examples of other people who've learned to draw, and that actually surprised them, too. I'm going to save what I think is my favorite, most surprising example until last. The first example is: I've worked a lot with children and students in schools.",
"我們還可以繼續，對不對？希望我們畫到這裏，已足以說服你們：其實我們大家都會畫畫。而且不只是在座的各位。我合作過的……我會給你們舉三個例子，都是一些學會了畫畫、而且連自己也感到驚訝的人。我會把我認為最喜歡、最令人驚訝的例子留到最後。第一個例子是：我常常和學校裏的孩子和學生一起工作。"],
["Actually the little ones, they just draw fine, but when they get to about 15 or 16, most of them think they can't draw. But I worked with them. I worked this week in a school where I was coaching them on using pictures for memory. A girl was trying to remember what red blood cells do, and she drew this little picture of a red blood cell carrying a handbag with O2 on it to remind her that the red blood cells carry oxygen to all parts of the body. That was a great one. The other people I worked with are many adults in all walks of life, and particularly in business, and they often will want to make presentations memorable. So again, a quick cartoon or sketch could be really good for that. And again, most people think they can't draw, but take this example. Couple of wavy lines, little boat could be a metaphor to represent we're all in this together. So that, if that was just drawn in the presentation, would really stay in the memory, wouldn't it? Yeah.",
"其實年紀小的孩子畫得都很好，但當他們長到大約十五、十六歲時，大多數都認為自己不會畫畫了。但我和他們合作過。這個星期我就在一間學校，指導他們用圖畫來幫助記憶。有個女生想記住紅血球的功能，她畫了一幅小圖：一顆紅血球提着一個寫着「O2」的手袋，好提醒自己紅血球會把氧氣帶到身體各部分。這個例子很棒。我合作過的其他人，是來自各行各業的許多成年人，尤其是商界的，他們常常想令自己的演講令人難忘。同樣，一個快速的卡通或草圖就很適合做這件事。同樣，大多數人都認為自己不會畫畫，但看看這個例子。幾條波浪線、一艘小船，可以用作比喻，代表我們大家都在同一條船上。所以，如果在演講中畫出來，就真的會留在記憶裏，對不對？是的。"],
["But the third example is - you shouldn't have favorites, should you? This is my favorite. Have you ever been at the party when someone asks you what you do? It gets a little bit skeptical when people ask me that. This lady said to me, well - I said, “I do a little bit of training, and I teach people to draw,” and she said, “Would you come along and do some for our group?” She said, “I work with some people” - she was a volunteer - a group of people who have suffered strokes. So I said, “Sure, I could spare some time for that.” So I said I would, and I booked the time in. Have you ever done that? You get near of that time and you think, “What have I let myself in for here?” “Will I be able to do it?” I thought, “What could I do with them?” you see. “I know.”",
"但第三個例子是——人不該有偏心的，對吧？這是我的最愛。你有沒有試過在派對上，有人問你是做甚麼的？當有人這樣問我時，我會有點猶疑。這位女士對我說，嗯——我說：「我做一點培訓，教人畫畫。」她就說：「你可以來為我們的團體做一些嗎？」她說：「我和一些人一起工作」——她是義工——那是一群曾經中風的人。於是我說：「當然可以，我可以抽出一些時間。」我答應了，並把時間定了下來。你有沒有試過這樣？當那個日子快到時，你就會想：「我到底把自己捲進了甚麼事情？」「我做得來嗎？」我心想：「我可以和他們做甚麼呢？」你們明白的。「我知道了。」"],
["“I'll do my cartoon drawing. They'll like that.” But then, as I got near of the time, I got more apprehensive, because then I was thinking, “I've worked with children, with all sorts of adults; I've never worked with a group like this.” It turns out it was all part of a charity called TALK. This TALK charity is a wonderful charity that helps people who've suffered strokes, but have a particular condition known as aphasia.",
"「我就畫我的卡通，他們應該會喜歡。」但後來，隨着日子越來越近，我變得越來越憂慮，因為我心想：「我和小孩合作過，和各種成年人合作過；但我從未和這樣的一群人合作過。」原來，這一切都是一個叫TALK的慈善機構的活動。這個TALK慈善機構是一個很了不起的機構，幫助那些曾經中風、並且患有一種叫「失語症」的特殊情況的人。"],
["You might have heard of aphasia, sometimes called dysphasia. The key thing is it affects their ability to communicate. So, for example, they might have trouble reading, writing, speaking, or understanding. It can be quite an isolating condition; it can be very, very frustrating and can lead to a loss of confidence.",
"你們也許聽過「失語症」，有時又叫「言語障礙」。關鍵在於，它會影響他們溝通的能力。舉例來說，他們可能在閱讀、書寫、說話或理解方面有困難。這可以是一種讓人相當孤立的情況；它可以非常、非常令人沮喪，甚至導致失去信心。"],
["Anyway, so I prepared all this stuff, what to do for this session - for a couple of hours, tea break in the middle - and I got more apprehensive. But actually, I needn't have worried, because I'm going to show you now the work that they did. It was one of the best things I've ever done. I'm going to show you the first slide. I taught them Spike, just like I did for you, and I want you to see the reaction on their faces when they did this.",
"總之，我準備好了所有東西，想好這節課要做甚麼——大約兩小時，中間有茶點時間——我變得更加憂慮。但其實，我根本不用擔心，因為我現在就給你們看看他們的作品。這是我做過的最美好的事情之一。我給你們看第一張幻燈片。我教他們畫史派克，就像剛才教你們一樣，我想讓你們看看他們畫成時臉上的反應。"],
["Oh. What you can see here are two of the stroke recoverers on the left and right, and one of the volunteer helpers in the center. Each stroke recoverer, there are about 36 in the room with volunteers as well, there's one-to-one helpers. You can just see the delight on their faces, can't you? Let's look at another picture. This is a gentleman called David, and he's holding up his picture, and you can tell it was the picture of Spike, can't you?",
"噢。你們在這裏看到的，是左右兩位中風康復者，以及中間一位義工幫助者。每一位中風康復者，房間裏大約有三十六位，加上義工——都是一對一的幫助者。你們可以看到他們臉上的喜悅，對不對？我們再看另一張照片。這位先生叫大衛（David），他正舉起自己的畫，你們一看就知道那是史派克的圖畫，對不對？"],
["In fact, I think he's drawn Spike even better there. But what I didn't realize until even after the session was that the number of the people in this session, including David, were drawing with their wrong hand. David's stroke meant that it affected the right side of his body, and he drew with his left hand, as many did. Nobody mentioned it to me, nobody complained.",
"其實，我覺得他畫的史派克還更好。但直到這節課結束之後我才發現，這節課裏有不少人，包括大衛在內，都是用他們不慣用的那隻手在畫。大衛的中風影響了他身體的右側，所以他用左手來畫，很多人也是這樣。沒有人向我提起過，也沒有人抱怨。"],
["They just got on with it. It was an inspirational session for me. It was quite a humbling session, one of the best things I felt I've ever done. At the end of it, I had a lovely email from doctor Mike Jordan, and he's the chair of the TALK group; happens to be a medical doctor, but he's the chair of the group. He wrote to me, and I'm quoting, he said, “Our recoverers learned today that they can draw. It's a bit more than that; this sort of activity really builds their confidence.” So I was happy, he was happy, everyone was happy, they've invited me back again, and I go in there now about every three or four months. So it's great. I thought that was a lovely example to share. Fancy one more drawing?",
"他們就這樣專心畫下去。對我來說，這是一節鼓舞人心的課。這也是一節相當令人謙卑的課，是我覺得自己做過的最美好的事情之一。課程結束時，我收到麥克．佐敦（Mike Jordan）醫生一封很窩心的電郵，他是TALK團體的主席；他碰巧是一位醫生，但同時是這個團體的主席。他寫信給我，我引用他的話：「我們的康復者今天學會了他們原來會畫畫。不只是這樣；這類活動真的能建立他們的信心。」所以我很高興，他很高興，每個人都很高興，他們又邀請我再去，現在我大約每三、四個月就去一次。所以真的很棒。我覺得這是個很溫馨、值得分享的例子。想再畫一幅嗎？"],
["Yes. Here we go. Grab your pens. Here we go. Right. I'm going to get you to draw someone that you would recognize. So start with a big nose, a bit like Spike's. Next, we'll do some eyes, and you might be thinking, “This is also a bit like Spike.” Watch the next bit. You're getting warm. There you go. Little line down there. Down here. Little V-shape, line to the left, line to the right. And you've got Albert Einstein.",
"好。我們開始。拿起你們的筆。來吧。好。我要讓你們畫一個你們會認得出的人。先由一個大鼻子開始，有點像史派克的。接着，我們畫眼睛，你們可能會想：「這個也有點像史派克。」看着接下來這部分。你們越來越接近了。就是這樣。這裏往下一條小線。到這裏。一個小小的V字形，左邊一筆，右邊一筆。你們就畫出了愛因斯坦（Albert Einstein）。"],
["So you've got the pens with you, you've proved that you can draw. You're very welcome to take the pens with you and have a practice at home, even show somebody else. But actually, I'd like to leave you with a final thought. When you walked in here today, many of you didn't believe you could draw. I've got a question for you about that. How many other beliefs and limiting thoughts do we all carry around with us everyday? Beliefs that we could perhaps potentially challenge and think differently about. If we did challenge those beliefs and think differently about them, apart from drawing, what else would be possible for us all? Thank you very much.",
"現在你們手上有筆，也證明了自己會畫畫。歡迎你們把筆帶走，回家練習，甚至教教別人。不過，我想留給你們一個最後的想法。今天當你們走進這裏時，很多人並不相信自己會畫畫。關於這一點，我有一個問題想問你們：我們每天還帶着多少其他的信念和自我設限的想法？那些也許我們可以去挑戰、去換個角度思考的信念。如果我們真的去挑戰那些信念、換個角度去想，那麼除了畫畫以外，對我們大家來說還有甚麼是可能的呢？非常感謝大家。"]
]

script:[
["So I want to start by offering you a free no-tech life hack, and all it requires of you is this: that you change your posture for two minutes. But before I give it away, I want to ask you to right now do a little audit of your body and what you're doing with your body. So how many of you are sort of making yourselves smaller? Maybe you're hunching, crossing your legs, maybe wrapping your ankles. Sometimes we hold onto our arms like this. Sometimes we spread out. I see you. So I want you to pay attention to what you're doing right now. We're going to come back to that in a few minutes, and I'm hoping that if you learn to tweak this a little bit, it could significantly change the way your life unfolds.",
"我想先送大家一個免費、無需科技的生活小竅門，你們要做的就只有這樣：把你的姿勢改變兩分鐘。不過在揭曉之前，我想請你們此刻先審視一下自己的身體，看看你正用身體做甚麼。你們當中有多少人正把自己縮得細細的？也許你正弓着背、交叉着腿，或者把腳踝盤起來。有時我們會這樣抱着自己的手臂，有時我們會展開身體。我看到你了。所以我想請你留意此刻自己在做甚麼，過幾分鐘我們會回到這一點；我希望如果你學會稍作調整，這足以大大改變你人生的展開方式。"],
["So, we're really fascinated with body language, and we're particularly interested in other people's body language. You know, we're interested in, like -- an awkward interaction, or a smile, or a contemptuous glance, or maybe a very awkward wink, or maybe even something like a handshake.",
"所以，我們對身體語言十分着迷，特別是對別人的身體語言感興趣。你知道，我們感興趣的，好像是——一次尷尬的互動、一個微笑、一個輕蔑的眼神，或者一個非常尷尬的眨眼，甚至是握手之類的動作。"],
["Narrator: Here they are arriving at Number 10. This lucky policeman gets to shake hands with the President of the United States. Here comes the Prime Minister -- No.",
"旁述員：他們來到了唐寧街10號，看看這個，這位幸運的警員可以和美國總統握手。噢，還有來自⋯⋯的總理？不。"],
["Amy Cuddy: So a handshake, or the lack of a handshake, can have us talking for weeks and weeks and weeks. Even the BBC and The New York Times. So obviously when we think about nonverbal behavior, or body language -- but we call it nonverbals as social scientists -- it's language, so we think about communication. When we think about communication, we think about interactions. So what is your body language communicating to me? What's mine communicating to you?",
"Amy Cuddy：所以一個握手，或沒有握手，都可以讓我們談論好幾個星期，連BBC和《紐約時報》也不例外。所以顯然，當我們想到非語言行為，或身體語言——不過我們作為社會科學家會稱之為「非語言訊號」——它是一種語言，於是我們會想到溝通；想到溝通，我們就想到互動。那麼你此刻的身體語言正在向我傳達甚麼？我的又在向你傳達甚麼？"],
["And there's a lot of reason to believe that this is a valid way to look at this. So social scientists have spent a lot of time looking at the effects of our body language, or other people's body language, on judgments. And we make sweeping judgments and inferences from body language. And those judgments can predict really meaningful life outcomes like who we hire or promote, who we ask out on a date.",
"有很多理由讓我們相信這是一個有效的角度。社會科學家花了很多時間，研究我們的身體語言，或別人的身體語言，如何影響判斷。我們會憑身體語言作出概括的判斷和推論，而這些判斷可以預測人生中很有意義的結果，例如我們僱用誰、給誰升職，或邀請誰去約會。"],
["For example, Nalini Ambady, a researcher at Tufts University, shows that when people watch 30-second soundless clips of real physician-patient interactions, their judgments of the physician's niceness predict whether or not that physician will be sued. So it doesn't have to do so much with whether or not that physician was incompetent, but do we like that person and how they interacted? Even more dramatic, Alex Todorov at Princeton has shown us that judgments of political candidates' faces in just one second predict 70 percent of U.S. Senate and gubernatorial race outcomes, and even, let's go digital, emoticons used well in online negotiations can lead you to claim more value from that negotiation. If you use them poorly, bad idea. Right?",
"舉例而言，Tufts大學的研究員Nalini Ambady發現，當人們觀看一段30秒、沒有聲音的真實醫生與病人互動片段，他們對這位醫生是否和善的判斷，竟能預測這位醫生會否被告上法庭。所以重點不在於這位醫生是否不稱職，而在於我們是否喜歡這個人、他們如何跟人互動。更誇張的是，普林斯頓的Alex Todorov告訴我們，僅憑一秒鐘對政治候選人樣貌的判斷，就能預測美國參議院及州長選舉七成的結果；甚至說到數碼世界，在網上談判中善用表情符號，可以讓你在談判中爭取到更多利益。若你用得不好，那就是壞主意。對吧？"],
["So when we think of nonverbals, we think of how we judge others, how they judge us and what the outcomes are. We tend to forget, though, the other audience that's influenced by our nonverbals, and that's ourselves. We are also influenced by our nonverbals, our thoughts and our feelings and our physiology.",
"所以當我們想到非語言訊號，我們會想到我們如何評斷別人、別人如何評斷我們，以及結果如何。可是我們往往忘記了另一個受非語言訊號影響的觀眾，那就是我們自己。我們也會被自己的非語言訊號影響，包括我們的想法、感受和生理狀態。"],
["So what nonverbals am I talking about? I'm a social psychologist. I study prejudice, and I teach at a competitive business school, so it was inevitable that I would become interested in power dynamics. I became especially interested in nonverbal expressions of power and dominance.",
"那麼我說的究竟是怎樣的非語言訊號？我是一位社會心理學家，研究偏見，並在一所競爭激烈的商學院任教，所以我無可避免地對權力動態產生興趣，尤其對權力與支配的非語言表達特別着迷。"],
["And what are nonverbal expressions of power and dominance? Well, this is what they are. So in the animal kingdom, they are about expanding. So you make yourself big, you stretch out, you take up space, you're basically opening up. It's about opening up. And this is true across the animal kingdom. It's not just limited to primates. And humans do the same thing.",
"那麼權力與支配的非語言表達究竟是甚麼？嗯，就是這樣。在動物界裏，它們與「擴張」有關。你把自己變大、伸展開來、佔據空間，基本上就是把身體張開。就是張開。這在整個動物界都是如此，不僅限於靈長類，人類也做同樣的事。"],
["So they do this both when they have power sort of chronically, and also when they're feeling powerful in the moment. And this one is especially interesting because it really shows us how universal and old these expressions of power are. This expression, which is known as pride, Jessica Tracy has studied. She shows that people who are born with sight and people who are congenitally blind do this when they win at a physical competition.",
"不論是長期掌權，還是在某一刻感到充滿力量，他們都會這樣做。特別有趣的是，這讓我們看到權力的表達是多麼普遍而古老。這種被稱為「自豪」的姿態，Jessica Tracy研究過。她發現，天生視力正常的人，和天生失明的人，在體育比賽勝出時都會做出同樣的動作。"],
["So when they cross the finish line and they've won, it doesn't matter if they've never seen anyone do it. They do this. So the arms up in the V, the chin is slightly lifted.",
"所以當他們衝過終點線贏得比賽時，即使從未見過別人這樣做也不要緊，他們都會做出這個動作：雙臂高舉成V字形，下巴微微揚起。"],
["What do we do when we feel powerless? We do exactly the opposite. We close up. We wrap ourselves up. We make ourselves small. We don't want to bump into the person next to us. So again, both animals and humans do the same thing. And this is what happens when you put together high and low power. So what we tend to do when it comes to power is that we complement the other's nonverbals. So if someone is being really powerful with us, we tend to make ourselves smaller. We don't mirror them. We do the opposite of them.",
"那我們感到無力的時候會怎樣？我們會做完全相反的事。我們把自己收起、把自己包起來、把自己縮小，不想撞到旁邊的人。同樣地，動物和人類都會這樣做。當高權力與低權力遇上時，就會這樣。在權力面前，我們往往會與對方的非語言訊號互補：如果有人對我們很強勢，我們往往會把自己縮得更小，不會模仿他們，而是做出相反的動作。"],
["So I'm watching this behavior in the classroom, and what do I notice? I notice that MBA students really exhibit the full range of power nonverbals. So you have people who are like caricatures of alphas, really coming into the room, they get right into the middle of the room before class even starts, like they really want to occupy space. When they sit down, they're sort of spread out. They raise their hands like this.",
"當我在課堂上觀察這種行為時，你猜我發現甚麼？我發現MBA的學生真的把權力的非語言訊號展現得淋漓盡致。有些人簡直是「大佬」的漫畫版，一走進房間，還未上課就一屁股坐在正中央，好像真的很想佔據空間。他們坐下時身體會展開，舉手時是這樣的。"],
["You have other people who are virtually collapsing when they come in. As soon they come in, you see it. You see it on their faces and their bodies, and they sit in their chair and they make themselves tiny, and they go like this when they raise their hand.",
"另一些人則相反，他們一走進來你就會發現，從他們的臉和身體都看得出來，他們坐在椅子上時把自己縮得很小，舉手時是這樣的姿勢。"],
["I notice a couple of things about this. One, you're not going to be surprised. It seems to be related to gender. So women are much more likely to do this kind of thing than men. Women feel chronically less powerful than men, so this is not surprising.",
"關於這一點我留意到幾件事。第一，你不會感到意外，就是它似乎與性別有關。女性比男性更容易出現這種姿態。女性長期比男性感到力量較弱，所以這並不令人意外。"],
["But the other thing I noticed is that it also seemed to be related to the extent to which the students were participating, and how well they were participating. And this is really important in the MBA classroom, because participation counts for half the grade.",
"但我留意到的另一件事，是它似乎也與學生參與的程度和參與得好不好有關。這在MBA的課堂上非常重要，因為課堂參與佔了成績的一半。"],
["So business schools have been struggling with this gender grade gap. You get these equally qualified women and men coming in and then you get these differences in grades, and it seems to be partly attributable to participation. So I started to wonder, you know, okay, so you have these people coming in like this, and they're participating. Is it possible that we could get people to fake it and would it lead them to participate more?",
"所以商學院一直為這種性別成績差距而苦惱。同樣資歷的男女學生進來，成績卻出現差異，而這似乎有部分可歸因於課堂參與。於是我開始思考：有些人一走進來就是這樣，然後積極參與。那我們有沒有可能讓人「假裝」一下，從而讓他們參與得更多？"],
["So my main collaborator Dana Carney, who's at Berkeley, and I really wanted to know, can you fake it till you make it? Like, can you do this just for a little while and actually experience a behavioral outcome that makes you seem more powerful? So we know that our nonverbals govern how other people think and feel about us. There's a lot of evidence. But our question really was, do our nonverbals govern how we think and feel about ourselves?",
"於是我在柏克萊的主要合作夥伴Dana Carney和我很想知道：你能不能「假裝到成真」？也就是說，只要維持一小段時間，就真的能體驗到一種令你顯得更有力量的行為結果嗎？我們知道我們的非語言訊號會左右別人如何看待我們、如何感受我們，這方面證據很多。但我們真正的問題是：我們的非語言訊號會否左右我們如何看待自己、感受自己？"],
["There's some evidence that they do. So, for example, we smile when we feel happy, but also, when we're forced to smile by holding a pen in our teeth like this, it makes us feel happy. So it goes both ways. When it comes to power, it also goes both ways. So when you feel powerful, you're more likely to do this, but it's also possible that when you pretend to be powerful, you are more likely to actually feel powerful.",
"這方面確實有些證據。舉例來說，我們開心的時候會笑，但同樣地，當我們被迫像這樣用牙齒咬着一枝筆而露出笑容時，也會令我們感到開心。所以這是雙向的。說到權力，也是雙向的。當你感到有力量時，你更可能做出這個姿態；但反過來，當你假裝自己很有力量時，你也更可能真的感到有力量。"],
["So the second question really was, you know, so we know that our minds change our bodies, but is it also true that our bodies change our minds? And when I say minds, in the case of the powerful, what am I talking about?",
"所以第二個問題其實是：你看，我們知道心理會改變身體，但反過來，身體是否也會改變心理？而當我說「心理」，就充滿力量的人而言，我指的究竟是甚麼？"],
["So I'm talking about thoughts and feelings and the sort of physiological things that make up our thoughts and feelings, and in my case, that's hormones. I look at hormones. So what do the minds of the powerful versus the powerless look like?",
"我指的是想法、感受，以及構成我們想法和感受的那些生理事物；就我而言，那就是荷爾蒙。我研究荷爾蒙。那麼，有力量的人和沒有力量的人，他們的心理狀態是怎樣的呢？"],
["So powerful people tend to be, not surprisingly, more assertive and more confident, more optimistic. They actually feel they're going to win even at games of chance. They also tend to be able to think more abstractly. So there are a lot of differences. They take more risks. There are a lot of differences between powerful and powerless people. Physiologically, there also are differences on two key hormones: testosterone, which is the dominance hormone, and cortisol, which is the stress hormone.",
"毫不令人意外，有力量的人往往比較果斷、自信、樂觀。他們甚至在純靠運氣的遊戲中都覺得自己會贏，也比較能作抽象思考。所以差別很多。他們更願意冒險。有力量和沒有力量的人之間，差別很大。從生理上看，兩種關鍵荷爾蒙也有差異：一是睪固酮，即支配荷爾蒙；二是皮質醇，即壓力荷爾蒙。"],
["So what we find is that high-power alpha males in primate hierarchies have high testosterone and low cortisol, and powerful and effective leaders also have high testosterone and low cortisol. So what does that mean? When you think about power, people tended to think only about testosterone, because that was about dominance. But really, power is also about how you react to stress.",
"我們發現，在靈長類的階級中，高權力的「大佬」雄性擁有高睪固酮和低皮質醇；而有力量又高效的領袖，同樣是高睪固酮和低皮質醇。這代表甚麼呢？一提到權力，人們往往只想到睪固酮，因為那關乎支配。但其實，權力也關乎你如何應對壓力。"],
["So do you want the high-power leader that's dominant, high on testosterone, but really stress reactive? Probably not, right? You want the person who's powerful and assertive and dominant, but not very stress reactive, the person who's laid back.",
"那麼，你會想要一個充滿力量、支配欲強、睪固酮高，卻對壓力反應很大的領袖嗎？大概不會吧？你想要的是一個有力量、果斷、有支配力，但對壓力反應不大、比較從容的人。"],
["So we know that in primate hierarchies, if an alpha needs to take over, if an individual needs to take over an alpha role sort of suddenly, within a few days, that individual's testosterone has gone up significantly and his cortisol has dropped significantly. So we have this evidence, both that the body can shape the mind, at least at the facial level, and also that role changes can shape the mind.",
"我們知道，在靈長類的階級中，如果有一個「大佬」需要接管，如果某個個體需要突然接掌大佬的位置，那麼在幾天之內，這個個體的睪固酮會大幅上升，皮質醇會大幅下降。所以我們有這樣的證據：身體能塑造心理，至少在面部表情的層面上是如此；而且角色的轉變也能塑造心理。"],
["shape the mind. So what happens, okay, you take a role change, what happens if you do that at a really minimal level, like this tiny manipulation, this tiny intervention? “For two minutes,” you say, “I want you to stand like this, and it's going to make you feel more powerful.”",
"既然角色轉變能塑造心理，那麼如果你把它縮到最小的程度會怎樣？像這樣一個微小的操作、一個微小的介入？你說：「維持兩分鐘，我要你這樣站着，它會讓你感到更有力量。」"],
["So this is what we did. We decided to bring people into the lab and run a little experiment, and these people adopted, for two minutes, either high-power poses or low-power poses, and I'm just going to show you five of the poses, although they took on only two. So here's one. A couple more. This one has been dubbed the “Wonder Woman” by the media. Here are a couple more. So you can be standing or you can be sitting. And here are the low-power poses. So you're folding up, you're making yourself small. This one is very low-power. When you're touching your neck, you're really protecting yourself.",
"我們是這樣做的：我們決定把人帶進實驗室做一個小實驗。這些人維持兩分鐘的「高權力姿勢」或「低權力姿勢」。我只會展示其中五個姿勢，儘管他們只做兩個。這是其一，再看幾個。這個被媒體取名為「神力女超人」。還有幾個，可以站着，也可以坐着。這些是低權力姿勢：你把身體摺起來、把自己縮小，這一個非常低權力。當你摸着自己的頸時，其實你是在保護自己。"],
["So this is what happens. They come in, they spit into a vial, for two minutes, we say, “You need to do this or this.” They don't look at pictures of the poses. We don't want to prime them with a concept of power. We want them to be feeling power. So two minutes they do this. We then ask them, “How powerful do you feel?” on a series of items, and then we give them an opportunity to gamble, and then we take another saliva sample. That's it. That's the whole experiment.",
"接着是這樣：他們進來，往小瓶裏吐口水，維持兩分鐘，我們說：「你要做這個或那個。」他們不會看姿勢的圖片，因為我們不想用「權力」這個概念去提示他們，我們想他們真正去感受力量。所以他們維持兩分鐘。然後我們用一系列項目問他們：「你感到自己有多大力量？」接着給他們一個賭博的機會，再抽取另一份唾液樣本。就是這樣，這就是整個實驗。"],
["So this is what we find. Risk tolerance, which is the gambling, we find that when you are in the high-power pose condition, 86 percent of you will gamble. When you're in the low-power pose condition, only 60 percent, and that's a whopping significant difference.",
"我們的發現是這樣的。風險承受力，也就是賭博，我們發現當你處於高權力姿勢的組別，會有86%的人選擇賭博；而處於低權力姿勢的組別，就只有60%，這是一個極大的顯著差異。"],
["Here's what we find on testosterone. From their baseline when they come in, high-power people experience about a 20-percent increase, and low-power people experience about a 10-percent decrease. So again, two minutes, and you get these changes. Here's what you get on cortisol. High-power people experience about a 25-percent decrease, and the low-power people experience about a 15-percent increase.",
"在睪固酮方面我們的發現是這樣的：以他們進來時的基線為準，高權力的人大約上升20%，低權力的人大約下降10%。同樣地，只需兩分鐘，你就得到這些變化。在皮質醇方面，高權力的人大約下降25%，低權力的人大約上升15%。"],
["So two minutes lead to these hormonal changes that configure your brain to basically be either assertive, confident and comfortable, or really stress-reactive, and feeling sort of shut down. And we've all had the feeling, right? So it seems that our nonverbals do govern how we think and feel about ourselves, so it's not just others, but it's also ourselves. Also, our bodies change our minds.",
"所以兩分鐘就能帶來這些荷爾蒙的變化，使你的大腦大致變得果斷、自信、自在，又或者變得對壓力反應強烈、感覺有點封閉退縮。我們都有過這種感覺，對吧？看來我們的非語言訊號確實會左右我們如何看待和感受自己；所以受影響的不只是別人，還有我們自己。同時，我們的身體能改變我們的心理。"],
["But the next question, of course, is, can power posing for a few minutes really change your life in meaningful ways? This is in the lab, it's this little task, it's just a couple of minutes. Where can you actually apply this? Which we cared about, of course. And so we think where you want to use this is evaluative situations, like social threat situations. Where are you being evaluated, either by your friends? For teenagers, it's at the lunchroom table. For some people it's speaking at a school board meeting. It might be giving a pitch or giving a talk like this or doing a job interview. We decided that the one that most people could relate to because most people had been through, was the job interview.",
"但接下來的問題當然是：維持幾分鐘的有力姿勢，真的能以有意義的方式改變你的人生嗎？這只是在實驗室裏、一個小任務、僅僅幾分鐘。你到底可以在哪裏應用它？這正是我們關心的。我們認為你會想用它的地方，是那些「被評估」的情境，例如帶有社交威脅的情境。你在哪裏會被評估？可能被朋友評估？對青少年來說，是在午餐桌上；對某些人來說，是在校董會上發言；也可能是做推銷、做一場像這樣的演講，或是求職面試。我們決定選一個大部分人都能感同身受、大部分人都經歷過的，那就是求職面試。"],
["So we published these findings, and the media are all over it, and they say, Okay, so this is what you do when you go in for the job interview, right? You know, right? So we were of course horrified, and said, Oh my God, no, no, that's not what we meant at all. For numerous reasons, no, don't do that. Again, this is not about you talking to other people. It's you talking to yourself.",
"我們發表了這些發現，媒體鋪天蓋地報道，他們說：好，所以這就是你去求職面試時要做的，對吧？對吧？我們當然嚇壞了，說：噢，我的天，不不不，我們完全不是這個意思。基於種種原因，不要那樣做。再說一次，這不是關於你對別人說話，而是關於你對自己說話。"],
["What do you do before you go into a job interview? You do this. You're sitting down. You're looking at your iPhone -- or your Android, not trying to leave anyone out. You're looking at your notes, you're hunching up, making yourself small, when really what you should be doing maybe is this, like, in the bathroom, right? Do that. Find two minutes. So that's what we want to test. Okay? So we bring people into a lab, and they do either high- or low-power poses again, they go through a very stressful job interview. It's five minutes long.",
"你去求職面試之前會做甚麼？你會這樣：坐着，看着你的iPhone——或Android，我不想冷落任何人。你看着筆記，弓起背、把自己縮小，其實你也許應該這樣做，好像在洗手間裏，對吧？就這樣做，找兩分鐘。所以這正是我們想測試的。好嗎？於是我們把人帶進實驗室，他們再次做高權力或低權力的姿勢，然後接受一個壓力很大的求職面試，長達五分鐘。"],
["They are being recorded. They're being judged also, and the judges are trained to give no nonverbal feedback, so they look like this. Like, imagine this is the person interviewing you. So for five minutes, nothing, and this is worse than being heckled. People hate this. It's what Marianne LaFrance calls “standing in social quicksand.” So this really spikes your cortisol. So this is the job interview we put them through, because we really wanted to see what happened. We then have these coders look at these tapes, four of them.",
"他們會被錄影，也會被評分，而評審受過訓練，完全不給任何非語言的反饋，所以他們看起來就是這樣。想像一下，這就是面試你的人，整整五分鐘，甚麼反應也沒有，這比被人喝倒采還要難受。人們都討厭這樣。這就是Marianne LaFrance所謂的「站在社交流沙之中」。這真的會令你的皮質醇急升。這就是我們讓他們經歷的求職面試，因為我們真的想看看會發生甚麼。之後我們請幾位評分員看這些錄影帶，一共四位。"],
["They're blind to the hypothesis. They're blind to the conditions. They have no idea who's been posing in what pose, and they end up looking at these sets of tapes, and they say, “We want to hire these people,” all the high-power posers. “We don't want to hire these people.”",
"他們不知道我們的假設，也不知道實驗的條件，完全不知道誰擺了甚麼姿勢。他們看完這些錄影帶後說：「我們想聘用這些人」——全都是擺高權力姿勢的人；「這些人我們不想聘用。」"],
["We also evaluate these people much more positively overall. But what's driving it? It's not about the content of the speech. It's about the presence that they're bringing to the speech. Because we rate them on all these variables related to competence, like, how well-structured is the speech? How good is it? What are their qualifications? No effect on those things. This is what's affected. These kinds of things. People are bringing their true selves, basically. They're bringing themselves. They bring their ideas, but as themselves, with no, you know, residue over them. So this is what's driving the effect, or mediating the effect.",
"整體而言，我們對這些人的評價也正面得多。但背後的原因是甚麼？並不在於演說的內容，而在於他們帶進演說的那種「存在感」。因為我們就一系列與能力有關的變項為他們評分，例如：演說結構有多好？講得有多好？他們有甚麼資歷？結果對這些都沒有影響。真正受影響的是這些東西。基本上，人們展現的是真正的自己，他們把自己帶進來，把想法帶進來，但是以「自己」的身分，沒有任何多餘的雜質蓋在上面。所以這才是推動、或中介這個效果的原因。"],
["So when I tell people about this, that our bodies change our minds and our minds can change our behavior, and our behavior can change our outcomes, they say to me, “It feels fake.” Right?",
"所以當我告訴別人這件事——我們的身體會改變心理，心理又會改變行為，行為又會改變結果——他們對我說：「這感覺很假。」對吧？"],
["So I said, fake it till you make it. It's not me. I don't want to get there and then still feel like a fraud. I don't want to feel like an impostor. I don't want to get there only to feel like I'm not supposed to be here. And that really resonated with me, because I want to tell you a little story about being an impostor and feeling like I'm not supposed to be here.",
"於是我說：「假裝到成真」吧。但這不像我的作風。我不想到達那一步之後，仍然覺得自己是個騙子；我不想覺得自己是個冒名頂替者；我不想好不容易到達那一步，卻只覺得自己「不應該在這裏」。這句話真的引起了我的共鳴，因為我想告訴你一個小故事，關於當一個冒名頂替者、覺得自己「不應該在這裏」的故事。"],
["When I was 19, I was in a really bad car accident. I was thrown out of a car, rolled several times. I was thrown from the car. And I woke up in a head injury rehab ward, and I had been withdrawn from college, and I learned that my IQ had dropped by two standard deviations, which was very traumatic. I knew my IQ because I had identified with being smart, and I had been called gifted as a child. So I'm taken out of college, I keep trying to go back. They say, “You're not going to finish college. Just, you know, there are other things for you to do, but that's not going to work out for you.”",
"在我19歲那年，我遇上一場很嚴重的車禍，整個人被拋出車外，翻滾了好幾圈。我是被拋出車外的，醒來時已在腦部創傷復康病房裏，我被逼從大學休學，還得知自己的智商下降了兩個標準差，這對我打擊很大。我一直很清楚自己的智商，因為我一向以「聰明」自居，小時候更被稱為資優兒童。所以我被逼離開大學，我不斷嘗試回去，他們卻說：「你不會讀得完大學的。你知道，還有很多別的事可以做，但這一條路對你行不通。」"],
["So I really struggled with this, and I have to say, having your identity taken from you, your core identity, and for me it was being smart, having that taken from you, there's nothing that leaves you feeling more powerless than that.",
"我為此真的很掙扎，我必須說，當你的身分被奪走，你最核心的身分認同——對我來說就是「聰明」——當它被奪走時，沒有甚麼比這更令人感到無力了。"],
["So I felt entirely powerless. I worked and worked, and I got lucky, and worked, and got lucky, and worked.",
"所以我感到完全無力。我拼命地努力再努力，然後碰上一點運氣，再努力，再碰上運氣，再努力。"],
["Eventually I graduated from college. It took me four years longer than my peers, and I convinced someone, my angel advisor, Susan Fiske, to take me on, and so I ended up at Princeton, and I was like, I am not supposed to be here. I am an impostor. And the night before my first-year talk, and the first-year talk at Princeton is a 20-minute talk to 20 people.",
"最終我還是大學畢業了。我比同輩多花了四年，我說服了一個人——我的天使導師Susan Fiske——收下我，於是我最後去了普林斯頓。而我心裏想：我不應該在這裏，我是個冒名頂替者。就在我第一年演講的前一晚——普林斯頓第一年的演講，是向20個人做一場20分鐘的演講。"],
["That's it. I was so afraid of being found out the next day that I called her and said, “I'm quitting.” She was like, “You are not quitting, because I took a gamble on you, and you're staying. You're going to stay, and this is what you're going to do. You are going to fake it. You're going to do every talk that you ever get asked to do. You're just going to do it and do it and do it, even if you're terrified and just paralyzed and having an out-of-body experience, until you have this moment where you say, ‘Oh my gosh, I'm doing it. Like, I have become this. I am actually doing this.’” So that's what I did. Five years in grad school, a few years, you know, I'm at Northwestern, I moved to Harvard, I'm at Harvard, I'm not really thinking about it anymore, but for a long time I had been thinking, “Not supposed to be here.”",
"就是這樣。我太害怕第二天被人識破，於是打電話給她說：「我要退出。」她卻說：「你不能退出，因為我在你身上押了注，你要留下來。你會留下來，而你要做的是這樣：你要假裝。你要做每一場別人邀請你去做的演講，你就一直做、一直做、一直做，即使你嚇得魂飛魄散、僵在原地、彷彿靈魂出竅，直到有一刻你會說：『噢，我的天，我正在做這件事，我已經成為這樣的人，我真的做到了。』」於是我就這樣做了。研究院五年，之後好幾年，你知道，我在西北大學，後來搬到哈佛，我在哈佛，我已經不太去想它了；但有很長一段時間，我一直在想：「我不應該在這裏。」"],
["So at the end of my first year at Harvard, a student who had not talked in class the entire semester, who I had said, “Look, you've gotta participate or else you're going to fail,” came into my office. I really didn't know her at all. She came in totally defeated, and she said, “I'm not supposed to be here.” And that was the moment for me. Because two things happened. One was that I realized, oh my gosh, I don't feel like that anymore. I don't feel that anymore, but she does, and I get that feeling. And the second was, she is supposed to be here! Like, she can fake it, she can become it.",
"所以在我哈佛第一年結束時，一個整個學期在課堂上都沒有說過話的學生——我曾對她說：「聽着，你必須參與，否則你會不及格」——來到我的辦公室。我其實完全不認識她。她一臉挫敗地進來，說：「我不應該在這裏。」那正是我的轉捩點。因為有兩件事同時發生。第一，我意識到，噢，我的天，我已經不再有那種感覺了；我不再那樣覺得，但她卻正這樣覺得，而我完全明白那種感受。第二，她本來就應該在這裏！她可以假裝，她可以成為真的。"],
["So I was like, “Yes, you are! You are supposed to be here! And tomorrow you're going to fake it, you're going to make yourself powerful, and, you know —And you're going to go into the classroom, and you are going to give the best comment ever.” You know? And she gave the best comment ever, and people turned around and were like, oh my God, I didn't even notice her sitting there.",
"於是我對她說：「你當然應該！你應該在這裏！明天你就去假裝，讓自己充滿力量，你知道的——你要走進課室，發表史上最棒的評論。」你知道嗎？她真的發表了史上最棒的評論，大家都回過頭來，好像在說：噢，我的天，我根本沒留意到她原來坐在那裏。"],
["She comes back to me months later, and I realized that she had not just faked it till she made it, she had actually faked it till she became it. So she had changed. And so I want to say to you, don't fake it till you make it. Fake it till you become it. Do it enough until you actually become it and internalize it.",
"幾個月後她再來找我，我意識到她不只是「假裝到成功」，而是「假裝到真的成為」。她真的改變了。所以我想對你們說：不要「假裝到成功」，而要「假裝到成為」。不斷去做，直到你真的成為那樣的人，並把它內化。"],
["The last thing I'm going to leave you with is this. Tiny tweaks can lead to big changes. So, this is two minutes. Two minutes, two minutes, two minutes. Before you go into the next stressful evaluative situation, for two minutes, try doing this, in the elevator, in a bathroom stall, at your desk behind closed doors. That's what you want to do. Configure your brain to cope the best in that situation. Get your testosterone up. Get your cortisol down. Don't leave that situation feeling like, oh, I didn't show them who I am. Leave that situation feeling like, I really feel like I got to say who I am and show who I am.",
"我最後想留給你們的是這一句：微小的調整可以帶來巨大的改變。所以，就是兩分鐘。兩分鐘、兩分鐘、兩分鐘。在你走進下一個充滿壓力、被人評估的情境之前，用兩分鐘試試這樣做：在升降機裏、在洗手間的隔間裏、在關上門的辦公桌前。這就是你要做的：調整你的大腦，讓它在那個情境中發揮得最好。讓你的睪固酮上升，讓你的皮質醇下降。別在離開那個情境時覺得：唉，我沒有讓他們看到真正的我。要在離開時覺得：我真的做到了說出自己是誰、展現自己是誰。"],
["So I want to ask you first, you know, both to try power posing, and also I want to ask you to share the science, because this is simple. I don't have ego involved in this. Give it away. Share it with people, because the people who can use it the most are the ones with no resources and no technology and no status and no power. Give it to them because they can do it in private. They need their bodies, privacy and two minutes, and it can significantly change the outcomes of their life.",
"所以我首先想請大家做兩件事：一是試試有力量的姿勢；二是把這項科學分享出去，因為它很簡單，我在這件事上並沒有私心。把它送出去，和別人分享，因為最需要用到它的，正是那些沒有資源、沒有技術、沒有地位、沒有權力的人。把它傳給他們，因為他們可以私下做，他們只需要自己的身體、一點私隱，和兩分鐘，而它就能大大改變他們人生的結果。"]
]

script:[
["I'd like to start with a simple question: Why do the poor make so many poor decisions? I know it's a harsh question, but take a look at the data. The poor borrow more, save less, smoke more, exercise less, drink more and eat less healthfully. Why? Well, the standard explanation was once summed up by the British Prime Minister, Margaret Thatcher. And she called poverty \"a personality defect.\" A lack of character, basically.",
"我想從一個簡單的問題開始：為甚麼窮人會作出那麼多差劣的決定？我知道這是個尖銳的問題，但不妨看看數據。窮人借得更多、儲蓄更少、吸煙更多、運動更少、喝酒更多，飲食也更不健康。為甚麼呢？嗯，一直以來，這個標準的解釋曾被英國首相戴卓爾夫人（Margaret Thatcher）一語概括。她把貧窮稱為「一種人格缺陷」，說白了，就是品格上的一種缺失。"],
["Now, I'm sure not many of you would be so blunt. But the idea that there's something wrong with the poor themselves is not restricted to Mrs. Thatcher. Some of you may believe that the poor should be held responsible for their own mistakes. And others may argue that we should help them to make better decisions. But the underlying assumption is the same: there's something wrong with them. If we could just change them, if we could just teach them how to live their lives, if they would only listen. And to be honest, this was what I thought for a long time. It was only a few years ago that I discovered that everything I thought I knew about poverty was wrong.",
"我肯定你們大多數人不會這麼直率。但是，認為窮人自己有問題的想法，並不止戴卓爾夫人一人才有。你們有些人或許相信，窮人應該為自己所犯的錯誤負責。另一些人則可能認為，我們應該幫助他們作出更好的決定。但背後的假設都是一樣的：他們自己有問題。只要我們能改變他們，只要我們能教他們如何正確地生活，只要他們肯聽從我們的勸告就好了。坦白說，長久以來，我也是這樣認為的。直到幾年前，我才發現我對貧窮的一切看法都是錯的。"],
["It all started when I accidentally stumbled upon a paper by a few American psychologists. They had traveled 8,000 miles, all the way to India, for a fascinating study. And it was an experiment with sugarcane farmers. You should know that these farmers collect about 60 percent of their annual income all at once, right after the harvest. This means that they're relatively poor one part of the year and rich the other. The researchers asked them to do an IQ test before and after the harvest. What they subsequently discovered completely blew my mind. The farmers scored much worse on the test before the harvest. The effects of living in poverty, it turns out, correspond to losing 14 points of IQ. Now, to give you an idea, that's comparable to losing a night's sleep or the effects of alcoholism.",
"一切都源於一次偶然的機會，我發現了一篇由幾位美國心理學家發表的論文。他們遠赴印度，跋涉八千英里，去進行一項引人入勝的研究。這是一個針對甘蔗農的實驗。你們應該知道，這些農民大約六成的年收入，都是在收成之後一次過收取的。這意味着他們每年有一段時間相對貧窮，另一段時間相對富裕。研究人員請他們在收成前和收成後分別做一次智商測試。他們隨後的發現徹底震撼了我。農民們在收成前的測試表現差得多。原來，生活在貧窮之中所帶來的影響，相當於損失了十四點智商。打個比方，這相當於一整晚沒有睡覺，甚至相當於酗酒所帶來的影響。"],
["A few months later, I heard that Eldar Shafir, a professor at Princeton University and one of the authors of this study, was coming over to Holland, where I live. So we met up in Amsterdam to talk about his revolutionary new theory of poverty. And I can sum it up in just two words: scarcity mentality. It turns out that people behave differently when they perceive a thing to be scarce. And what that thing is doesn't much matter -- whether it's not enough time, money or food.",
"幾個月後，我聽說 Eldar Shafir——普林斯頓大學的教授，也是這項研究的作者之一——將會來到我居住的荷蘭。於是我們在阿姆斯特丹見面，談談他那套革命性的貧窮新理論。我可以用兩個字概括：稀缺心態。事實證明，當人們認為某樣東西匱乏時，行為就會變得不一樣。而那樣東西究竟是甚麼並不重要——無論是時間不夠、金錢不夠，還是食物不夠。"],
["You all know this feeling, when you've got too much to do, or when you've put off breaking for lunch and your blood sugar takes a dive. This narrows your focus to your immediate lack -- to the sandwich you've got to have now, the meeting that's starting in five minutes or the bills that have to be paid tomorrow. So the long-term perspective goes out the window. You could compare it to a new computer that's running 10 heavy programs at once. It gets slower and slower, making errors. Eventually, it freezes -- not because it's a bad computer, but because it has too much to do at once. The poor have the same problem. They're not making dumb decisions because they are dumb, but because they're living in a context in which anyone would make dumb decisions.",
"你們都試過這種感覺：當你手上有太多事情要做，或者當你遲遲沒有停下來吃午飯、血糖驟降的時候。這會令你的注意力收窄，只集中在眼前的匱乏上——你此刻非吃不可的三文治、五分鐘後就要開始的會議，又或者明天要繳交的帳單。於是，長遠的目光就被拋諸腦後。你可以把它比作一部同時運行着十個大型程式的新電腦。它會愈跑愈慢，還會出錯。最終它會當機——不是因為它是一部壞電腦，而是因為它一次要處理的事情太多。窮人面對的正是同樣的問題。他們作出愚蠢的決定，並不是因為他們愚蠢，而是因為他們身處一個任何人都會作出愚蠢決定的處境。"],
["So suddenly I understood why so many of our anti-poverty programs don't work. Poverty is not a lack of knowledge. A recent analysis of 201 studies on the effectiveness of money-management training came to the conclusion that it has almost no effect at all. Now, don't get me wrong -- this is not to say the poor don't learn anything -- they can come out wiser for sure. But it's not enough. Or as Professor Shafir told me, \"It's like teaching someone to swim and then throwing them in a stormy sea.\"",
"於是我突然明白了，為甚麼那麼多扶貧計劃都不管用。貧窮並不是因為缺乏知識。最近一項針對兩百零一個有關理財培訓成效的研究分析得出結論：這類培訓幾乎完全沒有效果。別誤會我的意思——我不是說窮人甚麼都學不到——他們當然可以變得更精明。但這還不夠。又或者，正如 Shafir 教授對我說的：「這就像先教一個人游泳，然後把他扔進波濤洶湧的大海裏。」"],
["I still remember sitting there, perplexed. And it struck me that we could have figured this all out decades ago. I mean, these psychologists didn't need any complicated brain scans; they only had to measure the farmer's IQ, and IQ tests were invented more than 100 years ago. Actually, I realized I had read about the psychology of poverty before. George Orwell, one of the greatest writers who ever lived, experienced poverty firsthand in the 1920s. \"The essence of poverty,\" he wrote back then, is that it \"annihilates the future.\" And he marveled at, quote, \"How people take it for granted they have the right to preach at you and pray over you as soon as your income falls below a certain level.\"",
"我仍然記得，當時我坐在那裏，一臉困惑。我突然想到，其實我們幾十年前就該想通這一切。我的意思是，這些心理學家根本不需要甚麼複雜的腦部掃描；他們只需要量度農民的智商，而智商測試早在一百多年前就已經發明了。事實上，我意識到自己以前就讀過有關貧窮心理學的東西。喬治．奧威爾（George Orwell），有史以來最偉大的作家之一，在一九二零年代親身經歷過貧窮。他當年寫道，貧窮的本質「在於它摧毀了未來」。他還驚訝地說，引述他的話：「人們竟然理所當然地認為，一旦你的收入跌到某個水平以下，他們就有權向你說教、為你祈禱。」"],
["Now, those words are every bit as resonant today. The big question is, of course: What can be done? Modern economists have a few solutions up their sleeves. We could help the poor with their paperwork or send them a text message to remind them to pay their bills. This type of solution is hugely popular with modern politicians, mostly because, well, they cost next to nothing. These solutions are, I think, a symbol of this era in which we so often treat the symptoms, but ignore the underlying cause.",
"時至今日，這些話依然一針見血。當然，最大的問題是：可以做些甚麼呢？現代經濟學家手上有幾招。我們可以幫窮人處理文書工作，或者發個短訊提醒他們繳費。這一類方案在現代政客中大受歡迎，主要是因為它們幾乎不花甚麼錢。我認為，這些方案正是這個時代的寫照——我們往往只醫治病徵，卻忽略了背後的根本成因。"],
["So I wonder: Why don't we just change the context in which the poor live? Or, going back to our computer analogy: Why keep tinkering around with the software when we can easily solve the problem by installing some extra memory instead? At that point, Professor Shafir responded with a blank look. And after a few seconds, he said, \"Oh, I get it. You mean you want to just hand out more money to the poor to eradicate poverty. Uh, sure, that'd be great. But I'm afraid that brand of left-wing politics you've got in Amsterdam -- it doesn't exist in the States.\"",
"於是我在想：我們為甚麼不乾脆改變窮人身處的處境呢？又或者，回到我們那個電腦的比喻：當我們可以輕易地加裝一些額外的記憶體來解決問題時，為甚麼還要在軟件上修修補補呢？聽到這裏，Shafir 教授一臉茫然。過了幾秒，他才說：「哦，我明白了。你的意思是，你想直接派更多錢給窮人來消除貧窮。嗯，那當然好。但我恐怕，你們在阿姆斯特丹那套左翼政治，在美國是行不通的。」"],
["But is this really an old-fashioned, leftist idea? I remembered reading about an old plan -- something that has been proposed by some of history's leading thinkers. The philosopher Thomas More first hinted at it in his book, \"Utopia,\" more than 500 years ago. And its proponents have spanned the spectrum from the left to the right, from the civil rights campaigner, Martin Luther King, to the economist Milton Friedman. And it's an incredibly simple idea: basic income guarantee. What is it?",
"但這真的是一個過時的左派想法嗎？我記得曾讀過一個古老的計劃——它由歷史上一些頂尖的思想家提出。哲學家湯瑪斯．摩爾（Thomas More）早在五百多年前，就在他的著作《烏托邦》中首次暗示過它。它的支持者橫跨左右兩派，從民權運動家馬丁．路德．金（Martin Luther King），到經濟學家米爾頓．佛利民（Milton Friedman）。這是一個極其簡單的構想：保障基本收入。那究竟是甚麼？"],
["Well, that's easy. It's a monthly grant, enough to pay for your basic needs: food, shelter, education. It's completely unconditional, so no one's going to tell you what you have to do for it, and no one's going to tell you what you have to do with it.",
"嗯，很簡單。這是一筆每月發放的補助金，足夠支付你的基本所需：食物、住屋、教育。它是完全無條件的，所以沒有人會告訴你要為它做甚麼，也沒有人會告訴你該怎樣使用它。"],
["The basic income is not a favor, but a right. There's absolutely no stigma attached. So as I learned about the true nature of poverty, I couldn't stop wondering: Is this the idea we've all been waiting for? Could it really be that simple? And in the three years that followed, I read everything I could find about basic income. I researched the dozens of experiments that have been conducted all over the globe, and it didn't take long before I stumbled upon a story of a town that had done it -- had actually eradicated poverty. But then ... nearly everyone forgot about it.",
"基本收入不是一種恩惠，而是一種權利。它絕對不帶任何污名。所以，當我逐漸了解貧窮的真正本質時，我禁不住不斷在想：這會不會就是我們一直等待的那個構想？它真的可以這麼簡單嗎？在之後的三年裏，我讀遍了所有能找到、關於基本收入的資料。我研究了在全球各地進行過的數十項實驗，很快便偶然發現了一個小鎮的故事——它做到了，它真的消除了貧窮。但後來……幾乎所有人都把它忘記了。"],
["This story starts in Dauphin, Canada. In 1974, everybody in this small town was guaranteed a basic income, ensuring that no one fell below the poverty line. At the start of the experiment, an army of researchers descended on the town. For four years, all went well. But then a new government was voted into power, and the new Canadian cabinet saw little point to the expensive experiment. So when it became clear there was no money left to analyze the results, the researchers decided to pack their files away in some 2,000 boxes. Twenty-five years went by, and then Evelyn Forget, a Canadian professor, found the records.",
"這個故事始於加拿大的多芬市（Dauphin）。一九七四年，這個小鎮上每一個人都獲得保障的基本收入，確保沒有人跌落貧窮線以下。實驗開始時，一大隊研究人員進駐了這個小鎮。頭四年，一切順利。但後來，新政府上台，新一屆的加拿大內閣認為這項昂貴的實驗沒有多大意義。於是，當大家清楚知道再沒有經費去分析結果時，研究人員便決定把他們的檔案打包，收進大約兩千個箱子裏。二十五年過去了，然後，加拿大教授伊芙蓮．福傑（Evelyn Forget）找到了這些紀錄。"],
["For three years, she subjected the data to all manner of statistical analysis, and no matter what she tried, the results were the same every time: the experiment had been a resounding success.",
"三年來，她對這些數據進行了各式各樣的統計分析，不論她怎樣嘗試，每一次得出的結果都是一樣的：這個實驗取得了巨大而徹底的成功。"],
["Evelyn Forget discovered that the people in Dauphin had not only become richer but also smarter and healthier. The school performance of kids improved substantially. The hospitalization rate decreased by as much as 8.5 percent. Domestic violence incidents were down, as were mental health complaints. And people didn't quit their jobs. The only ones who worked a little less were new mothers and students -- who stayed in school longer. Similar results have since been found in countless other experiments around the globe, from the US to India.",
"伊芙蓮．福傑發現，多芬市的居民不但變得更富有，還變得更聰明、更健康。孩子們在學校的表現有了顯著的進步。住院率下降了多達百分之八點五。家庭暴力事件減少了，精神健康方面的求助也減少了。而人們並沒有辭掉工作。唯一工作得少一點的，是新手媽媽和學生——學生在學校讀書的時間更長了。此後，從美國到印度，全球無數其他的實驗也得出了相似的結果。"],
["So ... here's what I've learned. When it comes to poverty, we, the rich, should stop pretending we know best. We should stop sending shoes and teddy bears to the poor, to people we have never met. And we should get rid of the vast industry of paternalistic bureaucrats when we could simply hand over their salaries to the poor they're supposed to help.",
"所以……這就是我學到的。談到貧窮，我們這些富有的人，應該停止假裝自己最清楚該怎樣做。我們應該停止把鞋子和泰迪熊送給那些我們從未見過的窮人。我們也應該廢除那個龐大的家長式官僚體系，因為我們大可以直接把他們的薪水，交給那些他們理應幫助的窮人。"],
["Because, I mean, the great thing about money is that people can use it to buy things they need instead of things that self-appointed experts think they need. Just imagine how many brilliant scientists and entrepreneurs and writers, like George Orwell, are now withering away in scarcity. Imagine how much energy and talent we would unleash if we got rid of poverty once and for all. I believe that a basic income would work like venture capital for the people. And we can't afford not to do it, because poverty is hugely expensive. Just look at the cost of child poverty in the US, for example. It's estimated at 500 billion dollars each year, in terms of higher health care spending, higher dropout rates, and more crime. Now, this is an incredible waste of human potential.",
"因為，我的意思是，金錢最妙的地方就在於，人們可以用它去買自己真正需要的東西，而不是那些自命專家的人認為他們需要的東西。試想想，有多少像喬治．奧威爾這樣傑出的科學家、企業家和作家，此刻正在匱乏中枯萎凋零。試想想，如果我們能一勞永逸地消除貧窮，將會釋放出多少能量與才華。我相信，基本收入對人民來說，就像創業投資一樣。我們不能不去做，因為貧窮的代價極其高昂。就以美國的兒童貧窮為例，單是這一項，估計每年就要付出五千億美元——包括更高的醫療開支、更高的輟學率，以及更多的罪案。這實在是對人類潛能一種難以想像的浪費。"],
["But let's talk about the elephant in the room. How could we ever afford a basic income guarantee? Well, it's actually a lot cheaper than you may think. What they did in Dauphin is finance it with a negative income tax. This means that your income is topped up as soon as you fall below the poverty line. And in that scenario, according to our economists' best estimates, for a net cost of 175 billion -- a quarter of US military spending, one percent of GDP -- you could lift all impoverished Americans above the poverty line.",
"但讓我們談談那個大家都心照不宣、卻避而不談的問題吧：我們究竟怎樣才負擔得起保障基本收入呢？其實，它比你想像中便宜得多。多芬市當年的做法，是用負入息稅去支付。這意味着，一旦你的收入跌落貧窮線以下，就會有補貼把它補足。在這種安排下，根據我們的經濟學家最精確的估算，只需付出淨成本一千七百五十億美元——相當於美國軍費的四分之一、國內生產總值（GDP）的百分之一——你就可以把所有貧困的美國人拉到貧窮線以上。"],
["Now, that should be our goal. The time for small thoughts and little nudges is past. I really believe that the time has come for radical new ideas, and basic income is so much more than just another policy. It is also a complete rethink of what work actually is. And in that sense, it will not only free the poor, but also the rest of us.",
"這，才應該是我們的目標。那個只作小修小補、只靠輕輕推一把的時代，已經過去了。我真心相信，是時候提出激進的新構想了，而基本收入遠遠不只是又一項政策而已。它更是對「工作」究竟是甚麼的一次徹底重新思考。從這個意義上說，它不僅會解放窮人，也會解放我們其餘所有人。"],
["Nowadays, millions of people feel that their jobs have little meaning or significance. A recent poll among 230,000 employees in 142 countries found that only 13 percent of workers actually like their job. And another poll found that as much as 37 percent of British workers have a job that they think doesn't even need to exist. It's like Brad Pitt says in \"Fight Club,\" \"Too often we're working jobs we hate so we can buy shit we don't need.\"",
"時至今日，數以百萬計的人覺得自己的工作沒有多少意義或價值。最近一項針對一百四十二個國家、二十三萬名僱員的調查發現，只有百分之十三的員工是真正喜歡自己工作的。另一項調查則發現，多達百分之三十七的英國僱員認為，自己的工作根本沒有存在的必要。正如畢彼特（Brad Pitt）在《搏擊會》裏所說：「我們常常做着自己憎恨的工作，只為了買一些自己根本不需要的破爛東西。」"],
["Now, don't get me wrong -- I'm not talking about the teachers and the garbagemen and the care workers here. If they stopped working, we'd be in trouble. I'm talking about all those well-paid professionals with excellent résumés who earn their money doing ... strategic transactor peer-to-peer meetings while brainstorming the value add-on of disruptive co-creation in the network society.",
"別誤會我的意思——我這裏並不是說老師、清潔工和照顧者。如果他們不再工作，我們就麻煩了。我說的是那些擁有漂亮履歷、收入豐厚的專業人士，他們賺錢的方式，就是……一邊開着「策略性交易者對等會議」，一邊集思廣益，探討在網絡社會裏「破壞式共同創造的附加價值」。"],
["Or something like that. Just imagine again how much talent we're wasting, simply because we tell our kids they'll have to \"earn a living.\" Or think of what a math whiz working at Facebook lamented a few years ago: \"The best minds of my generation are thinking about how to make people click ads.\"",
"又或者諸如此類的東西。再想想我們正在浪費多少才華，就只因為我們告訴孩子，他們將來得「搵食餬口」。又或者想想幾年前，一位在 Facebook 工作的數學天才所感嘆的：「我這一代最聰明的頭腦，都在思考如何令人們去點擊廣告。」"],
["I'm a historian. And if history teaches us anything, it is that things could be different. There is nothing inevitable about the way we structured our society and economy right now. Ideas can and do change the world. And I think that especially in the past few years, it has become abundantly clear that we cannot stick to the status quo -- that we need new ideas.",
"我是一個歷史學家。如果說歷史教曉了我們甚麼，那就是：事情本可以是另一個樣子。我們今天建構社會與經濟的方式，並沒有甚麼是理所當然、不可改變的。思想能夠、而且確實會改變世界。我認為，尤其在過去這幾年，有一點已經變得再清楚不過：我們不能再固守現狀——我們需要新的構想。"],
["I know that many of you may feel pessimistic about a future of rising inequality, xenophobia and climate change. But it's not enough to know what we're against. We also need to be for something. Martin Luther King didn't say, \"I have a nightmare.\"",
"我知道你們當中很多人，對一個不平等加劇、排外情緒高漲、氣候不斷變化的未來感到悲觀。但是，光是知道我們反對甚麼並不足夠。我們還必須知道自己支持甚麼。馬丁．路德．金當年說的，可不是「我有一個噩夢」。"],
["So ... here's my dream: I believe in a future where the value of your work is not determined by the size of your paycheck, but by the amount of happiness you spread and the amount of meaning you give. I believe in a future where the point of education is not to prepare you for another useless job but for a life well-lived. I believe in a future where an existence without poverty is not a privilege but a right we all deserve. So here we are. Here we are. We've got the research, we've got the evidence and we've got the means.",
"所以……這就是我的夢想：我相信在未來，你工作的價值，不會由你薪水的多少來決定，而是由你所散播的快樂、以及你所賦予的意義來決定。我相信在未來，教育的目的，不是為了讓你為另一份無意義的工作做好準備，而是為了讓你好好地過一生。我相信在未來，沒有貧窮的生活不再是一種特權，而是我們所有人都應得的權利。所以，我們就在這裏。我們就在這裏。我們有研究，我們有證據，我們也有辦法。"],
["Now, more than 500 years after Thomas More first wrote about a basic income, and 100 years after George Orwell discovered the true nature of poverty, we all need to change our worldview, because poverty is not a lack of character. Poverty is a lack of cash.",
"如今，在湯瑪斯．摩爾首次寫下基本收入的五百多年之後，在喬治．奧威爾發現貧窮真正本質的一百年之後，我們都需要改變自己的世界觀，因為貧窮並不是缺乏人格。貧窮，就是缺乏金錢。"]
]

backtrans:{zh:"我提起你今早做的第一個決定，還有那個內在的「貪睡鈕」，原因是：在你想改變的生命中任何一個範疇，你都必須知道一個事實——你永遠不會「有心情」去做。永遠不會。沒有人會來，動力不會自己出現，你永遠不會有心情去做。",
en:"And the reason why I'm bringing up this first decision that you made today, and the inner snooze alarm, is because in any area of your life that you want to change, any – there's one fact that you need to know. This one: You are never going to feel like it. Ever. No one's coming, motivation isn't happening, you're never going to feel like it."},
