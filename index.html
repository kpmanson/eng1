function gapfill(g,ti,gi){
  const id=`gf-${ti}-${gi}`; let n=0;
  const html=g.text.replace(/\{([^}]+)\}/g,(m,w)=>{ n++; return `<input data-ans="${w.toLowerCase()}" size="${Math.max(w.length,4)}" autocomplete="off" autocapitalize="off" oninput="onGapInput('${id}')"><span class="ansreveal" style="display:none"> ${w}</span>`; });
  return `<div id="${id}" data-label="[Talk ${ti+1}] Gap-fill ${gi+1}" data-total="${n}" data-ok="0" data-ti="${ti}" data-gi="${gi}" style="margin-bottom:20px">
    <div class="tagline" style="margin-bottom:8px">🎬 ${g.intro}</div><div class="gap-text">${html}</div>
    <div class="toolrow"><button class="btn btn-red btn-sm" onclick="checkGaps('${id}')">Check 核對</button><button class="btn btn-ghost btn-sm" onclick="revealGaps('${id}')">Show answers 答案</button><span class="score-line" id="${id}-score"></span></div></div>`;
}
function norm(s){ return s.toLowerCase().trim().replace(/[.,!?;:'"“”‘’]/g,""); }
function onGapInput(id){ const box=document.getElementById(id); const vals=[]; box.querySelectorAll("input[data-ans]").forEach(inp=>vals.push(inp.value)); STATE.gaps[id]=vals; save(); }
function checkGaps(id){
  const box=document.getElementById(id); let ok=0,total=0;
  box.querySelectorAll("input[data-ans]").forEach(inp=>{ total++; if(norm(inp.value)===norm(inp.dataset.ans)){inp.className="ok";ok++;} else inp.className=inp.value.trim()?"bad":""; });
  box.dataset.ok=ok; document.getElementById(id+"-score").textContent=`${ok} / ${total} correct`;
  awardBest(`gap:${+box.dataset.ti}:${+box.dataset.gi}`, ok*2);
  if(ok===total && total>0) unlock("sharp_ear"); pointsCheck();
}
function revealGaps(id){ document.getElementById(id).querySelectorAll("input[data-ans]").forEach(inp=>{ if(norm(inp.value)!==norm(inp.dataset.ans)) inp.nextElementSibling.style.display="inline"; }); }
function showScore(i){
  const panel=document.getElementById(`panel-${i}-listen`); const qs=[...panel.querySelectorAll(".q")].filter(q=>q.dataset.label.includes("Detail"));
  const done=qs.filter(q=>q.dataset.answered==="1").length, right=qs.filter(q=>q.dataset.result==="correct").length;
  document.getElementById(`dscore-${i}`).textContent = done<qs.length? `Answered ${done} of ${qs.length}.` : `🏆 Score: ${right} / ${qs.length}`;
}

/* ---------- script ---------- */
function panelScript(t,i){
  const p=el(`<div class="panel" id="panel-${i}-script"></div>`);
  let html=`<div class="box"><h3>📖 Read the script</h3>
  <div class="tagline">Read the English FIRST. Only tap 中文 when you're stuck — challenge yourself!<span class="zhhelp"> 先讀英文，卡住了才點中文。</span></div>
  <div class="rd-controls"><button class="btn btn-ghost btn-sm" onclick="toggleAllZh(${i},true)">Show all 中文</button><button class="btn btn-ghost btn-sm" onclick="toggleAllZh(${i},false)">Hide all 中文</button></div>`;
  t.script.forEach(pair=>{ html+=`<div class="para"><button class="zhbtn" onclick="this.parentElement.classList.toggle('showzh')">中文</button><div class="en">${pair[0]}</div><div class="zh">${pair[1]}</div></div>`; });
  html+=`</div>`; p.appendChild(el(html));
  p.appendChild(el(`<div class="note note-blue">💡 <b>Pro tip:</b> after reading, watch the video once more with no script — you'll hear so much more!<span class="zhhelp"> 讀完後再裸聽一次，你會聽懂更多！</span></div>`));
  p.appendChild(el(doneRow(i,"script","I read the whole script in English.","我讀完了整篇英文文稿。")));
  return p;
}
function toggleAllZh(i,show){ document.querySelectorAll(`#panel-${i}-script .para`).forEach(pa=>pa.classList.toggle("showzh",show)); }

/* ---------- vocab ---------- */
/* ===== pronunciation (offline Web Speech, device voice) + syllable chopper ===== */
let _voice=null;
function pickVoice(){ try{ const vs=speechSynthesis.getVoices(); _voice=vs.find(v=>/^en/i.test(v.lang))||null; }catch(e){} }
if(typeof speechSynthesis!=="undefined"){ pickVoice(); try{ speechSynthesis.onvoiceschanged=pickVoice; }catch(e){} }
function speak(text, rate){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang="en"; u.rate=rate||0.9; if(_voice)u.voice=_voice; speechSynthesis.speak(u); }catch(e){} }
function chop(phrase){ return phrase.split(/\s+/).map(tok=>{ const k=tok.toLowerCase().replace(/[^a-z]/g,""); return (typeof SYLMAP!=="undefined"&&SYLMAP[k])?SYLMAP[k]:tok; }).join(" "); }

function panelVocab(t,i){
  const p=el(`<div class="panel" id="panel-${i}-vocab"></div>`);
  let cards=`<div class="box"><h3>🔤 Power words (${t.vocab.length})</h3><div class="tagline">Tap 🔊 to hear the word, ✂️ shows the syllables, 🐢 reads it slowly. Then guess the meaning before you reveal it.<span class="zhhelp"> 按 🔊 聽發音，✂️ 顯示音節，🐢 慢讀；先猜意思再揭曉。</span></div><div class="vgrid">`;
  t.vocab.forEach((v,idx)=>{
    const say=(v.say||v.w), chopped=chop(v.w), slow=chopped.replace(/·/g,", ");
    cards+=`<div class="vcard" id="vc-${i}-${idx}">
    <div class="vtop"><span class="w">${v.w}</span><span class="pos">${v.pos}</span>
      <button class="sndbtn" title="Hear it 聽發音" onclick='speak(${JSON.stringify(say)})'>🔊</button></div>
    <div class="syl">✂️ <b>${chopped}</b> <button class="slowbtn" title="Slow syllables 慢讀音節" onclick='speak(${JSON.stringify(slow)},0.5)'>🐢 slow</button></div>
    <div class="meaning"><span class="zh-m">${v.zh}</span> — ${v.en}<div class="eg">“${v.eg}”</div></div>
    <button class="btn btn-ghost btn-sm peek" onclick="openVocab(${i},${idx},this)">Meaning 意思</button></div>`; });
  cards+=`</div></div>`; p.appendChild(el(cards));
  const sample=t.vocab.slice(0,8); const shuffled=[...sample.map(v=>v.zh)].sort(()=>Math.random()-.5);
  let match=`<div class="box" id="match-${i}" data-label="[Talk ${i+1}] Vocab matching" data-total="${sample.length}"><h3>Quiz 1 · Match the meaning <span class="tag tag-pts">+pts</span></h3>`;
  sample.forEach(v=>{ match+=`<div class="match-row"><span class="mw">${v.w}</span><select data-ans="${v.zh}" onchange="onMatchChange(${i})"><option value="">— choose 選擇 —</option>${shuffled.map(m=>`<option>${m}</option>`).join("")}</select></div>`; });
  match+=`<div class="toolrow"><button class="btn btn-red btn-sm" onclick="checkMatch(${i})">Check 核對</button><span class="score-line" id="match-${i}-score"></span></div></div>`; p.appendChild(el(match));
  let quiz=`<div class="box"><h3>Quiz 2 · Use it in a new sentence <span class="tag tag-pts">+5 each</span></h3><div class="tagline">Same words, new situations — do you still recognise them?<span class="zhhelp"> 同樣的詞、全新情境。</span></div>`;
  t.vquiz.forEach((q,k)=>{ quiz+=mcq(q,`[Talk ${i+1}] Vocab Q${k+1}`,(ok)=>{ if(ok)awardBest("vq:"+i+":"+k,5); checkWordWizard(i); pointsCheck(); }); });
  quiz+=`</div>`; p.appendChild(el(quiz));
  p.appendChild(el(`<div class="note note-green">📒 <b>Vocab notebook:</b> copy your 5 favourite words into your booklet with your own example sentence.<span class="zhhelp"> 挑 5 個詞抄進小冊子並造句。</span></div>`));
  p.appendChild(el(doneRow(i,"vocab","I finished the vocabulary tasks.","我完成了詞彙練習。")));
  return p;
}
function openVocab(i,idx,btn){ const c=document.getElementById(`vc-${i}-${idx}`); c.classList.toggle("open"); btn.textContent=c.classList.contains("open")?"Hide 收起":"Meaning 意思"; if(c.classList.contains("open")) awardBest("vopen:"+i+":"+idx,1); }
function onMatchChange(i){ const box=document.getElementById("match-"+i); const vals=[]; box.querySelectorAll("select[data-ans]").forEach(s=>vals.push(s.value)); STATE.match["match-"+i]=vals; save(); }
function checkMatch(i){
  const box=document.getElementById("match-"+i); let ok=0;
  box.querySelectorAll("select[data-ans]").forEach(s=>{ if(s.value===s.dataset.ans){s.className="ok";ok++;} else s.className=s.value?"bad":""; });
  document.getElementById("match-"+i+"-score").textContent=`${ok} / ${box.dataset.total} correct`; box.dataset.ok=ok;
  awardBest("match:"+i,ok*3); checkWordWizard(i); pointsCheck();
}
function checkWordWizard(i){
  const box=document.getElementById("match-"+i); const matchFull=box&&(+box.dataset.ok)===(+box.dataset.total)&&(+box.dataset.total)>0;
  const panel=document.getElementById(`panel-${i}-vocab`); const vqs=[...panel.querySelectorAll(".q")].filter(q=>q.dataset.label.includes("Vocab Q"));
  const vright=vqs.filter(q=>q.dataset.result==="correct").length; if(matchFull||vright>=5) unlock("word_wizard");
}

/* ---------- speak ---------- */
function panelSpeak(t,i){
  const p=el(`<div class="panel" id="panel-${i}-speak"></div>`);
  p.appendChild(el(`
  <div class="box"><h3>🎤 Task 1 · Shadowing <span class="tag tag-speak">PRONUNCIATION</span></h3>
    <div class="tagline">${t.shadow.label}</div>
    <div class="shadow-box">${t.shadow.text}</div>
    <ol class="goal-list" style="font-size:.9rem">
      <li>Find this part in the video. Listen once, following the text with your eyes.</li>
      <li>Play it again and read ALOUD at the same time — copy the speaker's speed, stress and emotion.</li>
      <li>Do it 3 times, then <b>record yourself</b> on your phone.</li>
      <li>Listen back and tick the checklist honestly!</li>
    </ol>
    <div class="checkitem"><input type="checkbox" data-key="chk:shadow1:${i}" data-cl="[Talk ${i+1}] Shadowing: clear sounds" onchange="onCheck(this)"><span>I pronounced the difficult words clearly${Z("發音清晰")}</span></div>
    <div class="checkitem"><input type="checkbox" data-key="chk:shadow2:${i}" data-cl="[Talk ${i+1}] Shadowing: stress & rhythm" onchange="onCheck(this)"><span>I copied the speaker's stress and rhythm${Z("模仿重音與節奏")}</span></div>
    <div class="checkitem"><input type="checkbox" data-key="chk:shadow3:${i}" data-cl="[Talk ${i+1}] Shadowing: smooth" onchange="onCheck(this)"><span>I read smoothly without long pauses${Z("流暢無長停頓")}</span></div>
  </div>`));
  let d=`<div class="box"><h3>💬 Task 2 · Speak your mind <span class="tag tag-speak">FLUENCY</span></h3>
  <div class="tagline">Choose at least ONE question. Think for 1 minute, then record yourself for 1 minute. Don't write a script — just talk!<span class="zhhelp"> 選一題，思考 1 分鐘，錄音講 1 分鐘。</span></div><ol class="goal-list">`;
  t.discuss.forEach(q=>{ d+=`<li>${q}</li>`; });
  d+=`</ol><div class="note" style="margin-bottom:0">📱 <b>Keep your recordings!</b> Save them in one folder — your teacher may ask for your 3 best after summer.<span class="zhhelp"> 保存錄音，開學後老師會抽查。</span></div></div>`;
  p.appendChild(el(d));
  p.appendChild(el(`<div class="box"><h3>📝 Speaking log</h3>
  <textarea data-key="text:speaklog:${i}" data-label="[Talk ${i+1}] Speaking log" placeholder="e.g. 14 Jul — recorded Q2. First try had pauses; second was smoother. Hard words: credentials, holistic…" style="min-height:80px" oninput="onText(this)"></textarea></div>`));
  p.appendChild(el(doneRow(i,"speak","I shadowed AND recorded at least one 1-minute answer.","我完成了跟讀並錄音。")));
  return p;
}
function onCheck(cb){ STATE.checks[cb.dataset.key]=cb.checked; save(); if(cb.checked&&cb.dataset.key.startsWith("chk:shadow")) unlock("brave_voice"); }

/* ---------- write ---------- */
function panelWrite(t,i){
  const p=el(`<div class="panel" id="panel-${i}-write"></div>`);
  let frames=t.writeCore.frames.map(f=>`<li>${f}</li>`).join("");
  p.appendChild(el(`
  <div class="box"><h3>✍️ Core writing task <span class="tag tag-core">EVERYONE</span> <span class="tag tag-pts">+pts</span></h3>
    <p style="font-size:.93rem">${t.writeCore.task}</p>
    <div class="frames"><b>Sentence starters (use if you need them):</b><ul>${frames}</ul></div>
    <textarea data-key="text:write:${i}" data-label="[Talk ${i+1}] CORE WRITING" placeholder="Write here… aim for 100–150 words." oninput="onWrite(this,${i})" style="min-height:180px"></textarea>
    <div class="wc">0 words</div>
    <div class="note note-green" style="margin-bottom:0">✅ <b>Before you export, self-check:</b> opinion clear? a reason AND an example? at least 2 power words used?<span class="zhhelp"> 匯出前自查：觀點清楚？有理由和例子？用了 2 個重點詞？</span></div>
  </div>`));
  p.appendChild(el(doneRow(i,"write","I finished the core writing task.","我完成了核心寫作。")));
  return p;
}
function wordCount(v){ return (v.trim().match(/[A-Za-z']+/g)||[]).length; }
function onWrite(ta,i){ onText(ta); const n=wordCount(ta.value); ta.parentElement.querySelector(".wc").textContent=n+" words"; let pts=0; if(n>=100)pts=25; else if(n>=50)pts=15; else if(n>=20)pts=8; awardBest("write:"+i,pts); if(n>=100)unlock("wordsmith"); pointsCheck(); }

/* ---------- revise ---------- */
function panelRevise(t,i){
  const p=el(`<div class="panel" id="panel-${i}-revise"></div>`); const s=t.summary;
  p.appendChild(el(`
  <div class="sumcard">
    <div style="font-size:.78rem;font-weight:700;color:var(--gold);letter-spacing:.05em">KEY TAKEAWAYS · 重溫卡</div>
    <div class="big-idea" style="margin-top:8px">${s.bigIdeaEn}<span class="zh">${s.bigIdeaZh}</span></div>
    ${s.takeaways.map(k=>`<div class="take">${k.en}<span class="zh">${k.zh}</span></div>`).join("")}
    <div class="quotecard"><div class="en">“${s.quoteEn}”</div><div class="zh">${s.quoteZh}</div></div>
  </div>`));
  let fc=`<div class="box"><h3>🃏 Flashcards <span class="tag tag-pts">flip all → badge</span></h3>
    <div class="tagline">See the English, recall the meaning — tap to flip and check. Flip them all to unlock the 🧠 Reviser badge!<span class="zhhelp"> 看英文猜中文，點一下翻開核對。</span></div><div class="flashwrap">`;
  t.vocab.slice(0,8).forEach((v,idx)=>{ fc+=`<div class="flash" id="fl-${i}-${idx}" onclick="flip(${i},${idx})"><div class="flash-inner">
    <div class="flash-face flash-front"><div class="w">${v.w}</div><div class="pos">${v.pos}</div><div class="hint">tap 點我</div></div>
    <div class="flash-face flash-back"><div class="zh-m">${v.zh}</div><div class="en-m">${v.en}</div></div></div></div>`; });
  fc+=`</div><div class="score-line" id="flip-${i}-score" style="margin-top:12px"></div></div>`; p.appendChild(el(fc));
  p.appendChild(el(`<div class="note note-purple">🔁 <b>Spaced revision:</b> come back to this page 2–3 days later and flip the cards again — memory sticks far better. This page also feeds the home Revision Hub.<span class="zhhelp"> 間隔重溫法：隔幾日回來再翻一次，記得更牢。</span></div>`));
  return p;
}
function flip(i,idx){ const f=document.getElementById(`fl-${i}-${idx}`); f.classList.toggle("flipped"); STATE.flip[`fl-${i}-${idx}`]=f.classList.contains("flipped"); save(); updateFlipScore(i); }
function updateFlipScore(i){
  const total=TALKS[i].vocab.slice(0,8).length; let n=0; for(let idx=0;idx<total;idx++){ if(STATE.flip[`fl-${i}-${idx}`])n++; }
  const s=document.getElementById(`flip-${i}-score`); if(s)s.textContent=`Flipped ${n} / ${total}`;
  if(n===total&&total>0){ awardBest("revise:"+i,15); unlock("reviser"); pointsCheck(); }
}

/* ---------- challenge ---------- */
function panelChallenge(t,i){
  const p=el(`<div class="panel" id="panel-${i}-challenge"></div>`);
  p.appendChild(el(`<div class="note note-purple">🚀 <b>Challenge track</b> — for students who want to push their writing and vocabulary further. Do as much as you can!<span class="zhhelp"> 進階挑戰：適合想更上一層樓的同學。</span></div>`));
  let para=`<div class="box"><h3>Challenge 1 · Paraphrase the golden lines <span class="tag tag-challenge">REPHRASING</span></h3><div class="tagline">Rewrite each line in your OWN words, keeping the meaning. Then compare with the model.<span class="zhhelp"> 用自己的話改寫，再對照範例。</span></div>`;
  t.challenge.paraphrase.forEach((pp,k)=>{ para+=`<div class="q"><div class="qt">“${pp.src}”</div>
    <textarea data-key="text:para:${i}:${k}" data-label="[Talk ${i+1}] Paraphrase ${k+1}" placeholder="Your version…" style="min-height:70px" oninput="onChalWrite(this,${i})"></textarea>
    <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="this.nextElementSibling.classList.toggle('show')">Compare with model 對照範例</button>
    <div class="model">${pp.model}</div></div>`; });
  para+=`</div>`; p.appendChild(el(para));
  p.appendChild(el(`
  <div class="box"><h3>Challenge 2 · Back-translation duel <span class="tag tag-challenge">TRANSLATION</span></h3>
    <div class="tagline">Translate this Chinese back into English WITHOUT the script, then reveal the original and compare.<span class="zhhelp"> 不看文稿，把中文譯回英文，再對比原文。</span></div>
    <div class="frames">${t.challenge.backtrans.zh}</div>
    <textarea data-key="text:bt:${i}" data-label="[Talk ${i+1}] Back-translation" placeholder="Your English translation…" style="min-height:110px" oninput="onChalWrite(this,${i})"></textarea>
    <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="this.nextElementSibling.classList.toggle('show')">Reveal the original 顯示原文</button>
    <div class="model">${t.challenge.backtrans.en}</div>
    <textarea data-key="text:btr:${i}" data-label="[Talk ${i+1}] Back-translation reflection" placeholder="2 things the original did better than mine: …  1 thing I did well: …" style="min-height:70px;margin-top:10px" oninput="onChalWrite(this,${i})"></textarea>
  </div>`));
  p.appendChild(el(`
  <div class="box"><h3>Challenge 3 · Full writing task <span class="tag tag-challenge">DSE-STYLE</span></h3>
    <p style="font-size:.93rem">${t.challenge.essay.task}</p>
    <div class="frames"><b>Tips:</b><ul>${t.challenge.essay.tips.map(x=>`<li>${x}</li>`).join("")}</ul></div>
    <textarea data-key="text:essay:${i}" data-label="[Talk ${i+1}] CHALLENGE ESSAY" placeholder="Write your full piece here (≈400 words)…" oninput="onEssay(this,${i})" style="min-height:280px"></textarea>
    <div class="wc">0 words</div>
  </div>`));
  p.appendChild(el(doneRow(i,"challenge","I attempted at least one challenge task.","我完成了最少一項挑戰。")));
  return p;
}
function onChalWrite(ta,i){ onText(ta); if(wordCount(ta.value)>=40){ awardBest("chal:"+i,20); unlock("challenger"); pointsCheck(); } }
function onEssay(ta,i){ onText(ta); const n=wordCount(ta.value); ta.parentElement.querySelector(".wc").textContent=n+" words"; if(n>=40){ awardBest("chal:"+i,20); unlock("challenger"); pointsCheck(); } }

/* ---------- shared ---------- */
function onText(ta){ STATE.text[ta.dataset.key]=ta.value; save(); }

/* ================= NAV & PROGRESS ================= */
function goHome(){ document.getElementById("view-home").style.display="block"; const h=document.getElementById("view-hub"); if(h)h.style.display="none"; TALKS.forEach((t,i)=>document.getElementById("view-"+i).style.display="none"); refreshHome(); window.scrollTo(0,0); }
function openTalk(i){ document.getElementById("view-home").style.display="none"; const h=document.getElementById("view-hub"); if(h)h.style.display="none"; TALKS.forEach((t,k)=>document.getElementById("view-"+k).style.display=k===i?"block":"none"); window.scrollTo(0,0); }
function switchTab(i,key){ STEPS.forEach(([k])=>{ document.getElementById(`tab-${i}-${k}`).classList.toggle("active",k===key); document.getElementById(`panel-${i}-${k}`).classList.toggle("active",k===key); }); window.scrollTo(0,0); }
function refreshProgress(i){
  let done=0; STEP_KEYS.forEach(s=>{ const cb=document.getElementById(`done-${i}-${s}`); const t=document.getElementById(`tick-${i}-${s}`); if(cb&&cb.checked){done++; if(t)t.textContent="✓";} else if(t)t.textContent=""; });
  const pb=document.getElementById(`pbar-${i}`); if(pb)pb.style.width=(done/STEP_KEYS.length*100)+"%";
  const pl=document.getElementById(`plabel-${i}`); if(pl)pl.textContent=`${done} / ${STEP_KEYS.length} steps done`;
}
function refreshHome(){
  const {cur,next}=levelFor(STATE.points); const pct=next?Math.min(100,Math.round((STATE.points-cur[0])/(next[0]-cur[0])*100)):100;
  const ico=document.getElementById("homeLvlIco"), nm=document.getElementById("homeLvlName"), bar=document.getElementById("homeLvlBar"), nx=document.getElementById("homeLvlNext"), bc=document.getElementById("homeBadgeCount");
  if(ico){ ico.textContent=cur[1].split(" ")[0]; nm.textContent=cur[1].split(" ").slice(1).join(" ")+" · "+STATE.points+" pts"; bar.style.width=pct+"%"; nx.textContent=next?`${next[0]-STATE.points} pts to ${next[1]}`:"Top level reached 👑"; bc.textContent="🏅 "+STATE.badges.length; }
}

/* ================= RESTORE ================= */
function restoreState(){
  if(STATE.name) document.getElementById("stuName").value=STATE.name;
  document.querySelectorAll("textarea[data-key]").forEach(ta=>{ if(STATE.text[ta.dataset.key]!==undefined){ ta.value=STATE.text[ta.dataset.key]; const wc=ta.parentElement.querySelector(".wc"); if(wc) wc.textContent=wordCount(ta.value)+" words"; } });
  document.querySelectorAll("input[type=checkbox]").forEach(cb=>{ if(cb.id&&STATE.checks[cb.id])cb.checked=true; if(cb.dataset.key&&STATE.checks[cb.dataset.key])cb.checked=true; });
  Object.keys(STATE.mcq).forEach(id=>replayMCQ(id));
  Object.keys(STATE.gaps).forEach(id=>{ const box=document.getElementById(id); if(!box)return; const inputs=box.querySelectorAll("input[data-ans]"); STATE.gaps[id].forEach((val,k)=>{ if(inputs[k])inputs[k].value=val; }); });
  Object.keys(STATE.match).forEach(id=>{ const box=document.getElementById(id); if(!box)return; const sels=box.querySelectorAll("select[data-ans]"); STATE.match[id].forEach((val,k)=>{ if(sels[k])sels[k].value=val; }); });
  Object.keys(STATE.flip).forEach(id=>{ if(STATE.flip[id]){ const f=document.getElementById(id); if(f)f.classList.add("flipped"); } });
  TALKS.forEach((t,i)=>{ refreshProgress(i); updateFlipScore(i); });
  applyZh(); updateHud(); refreshHome();
}

/* ================= INIT ================= */
buildHome();
TALKS.forEach((t,i)=>buildTalk(t,i));
buildHub();
restoreState();
goHome();
</script>
