script:[
["What keeps us healthy and happy as we go through life? If you were going to invest now in your future best self, where would you put your time and your energy? There was a recent survey of millennials asking them what their most important life goals were, and over 80 percent said that a major life goal for them was to get rich. And another 50 percent of those same young adults said that another major life goal was to become famous.",
"在我們的人生中，是甚麼讓我們保持健康且幸福呢？如果現在你可以為未來的自己投資，你會把時間和精力投放在哪裏呢？最近在千禧一代中有這麼一個調查，問他們生活中最重要的目標是甚麼，超過 80% 的人說最大的生活目標就是要有錢，還有 50% 的年輕人說，另一個重要的生活目標就是要出名。"],
["And we're constantly told to lean in to work, to push harder and achieve more. We're given the impression that these are the things that we need to go after in order to have a good life. Pictures of entire lives, of the choices that people make and how those choices work out for them, those pictures are almost impossible to get. Most of what we know about human life we know from asking people to remember the past, and as we know, hindsight is anything but 20/20. We forget vast amounts of what happens to us in life, and sometimes memory is downright creative.",
"而且我們總是被灌輸要投入工作，要加倍努力、成就更多。我們被灌輸了這樣一種觀念：只有做到剛才說的這些，才能有好日子過。要人們縱觀整個人生，想像各種選擇，以及這些選擇最終導致的結果，幾乎是不可能的。關於人的一生，我們能了解到的，大部分都是通過人的回憶得來，但眾所周知，事後之明並不可靠。一生中，我們會忘記很多發生在自己身上的事情，而且記憶有時相當地天馬行空。"],
["But what if we could watch entire lives as they unfold through time? What if we could study people from the time that they were teenagers all the way into old age to see what really keeps people happy and healthy?",
"但如果我們可以看着人的一生隨時間慢慢展開呢？如果我們能夠從人們十幾歲的時候一直研究到年老，去看看究竟是甚麼讓人保持快樂和健康呢？"],
["We did that. The Harvard Study of Adult Development may be the longest study of adult life that's ever been done. For 75 years, we've tracked the lives of 724 men, year after year, asking about their work, their home lives, their health, and of course asking all along the way without knowing how their life stories were going to turn out.",
"我們做到了。哈佛大學這項成人發展研究，可能是有史以來關於成人生活最長的研究。在 75 年的時間裏，我們追蹤了 724 個人的一生，年復一年，了解他們的工作、家庭生活、健康狀況；當然，我們一直沿途去問，卻不知道他們的人生故事最終將走向何方。"],
["Studies like this are exceedingly rare. Almost all projects of this kind fall apart within a decade because too many people drop out of the study, or funding for the research dries up, or the researchers get distracted, or they die, and nobody moves the ball further down the field. But through a combination of luck and the persistence of several generations of researchers, this study has survived. About 60 of our original 724 men are still alive, still participating in the study, most of them in their 90s.",
"像這樣的研究少之又少。幾乎所有這類項目都在 10 年內瓦解，因為有許多人會中途退出，或者是研究資金不足，或者是研究者轉換方向，又或者去世，然後項目無人接手。但憑着幸運女神的眷顧和幾代研究人員的堅持不懈，這個項目存活了下來。目前這 724 人中仍有 60 人在世，仍然在參與研究，大多數人已經 90 多歲了。"],
["And we are now beginning to study the more than 2,000 children of these men. And I'm the fourth director of the study. Since 1938, we've tracked the lives of two groups of men. The first group started in the study when they were sophomores at Harvard College. They all finished college during World War II, and then most went off to serve in the war. And the second group that we've followed was a group of boys from Boston's poorest neighborhoods, boys who were chosen for the study specifically because they were from some of the most troubled and disadvantaged families in the Boston of the 1930s. Most lived in tenements, many without hot and cold running water.",
"現在我們已經開始研究他們的子孫後代，人數多達 2000 多人。我是這個項目的第四任負責人。從 1938 年起，我們開始跟蹤兩組人的生活。第一組加入這個項目的人，當年在哈佛大學上大二。他們在二戰期間大學畢業，大部分人都參軍作戰了。我們追蹤的第二組人是一群來自波士頓貧民區的小男孩，他們之所以被選中，主要是因為他們來自 20 世紀 30 年代波士頓最困難、最貧困的家庭。大部分住在廉價公寓裏，很多都沒有冷熱水供應。"],
["When they entered the study, all of these teenagers were interviewed. They were given medical exams. We went to their homes and we interviewed their parents. And then these teenagers grew up into adults who entered all walks of life. They became factory workers and lawyers and bricklayers and doctors, one President of the United States. Some developed alcoholism. A few developed schizophrenia. Some climbed the social ladder from the bottom all the way to the very top, and some made that journey in the opposite direction.",
"在加入這個項目時，這些青少年都接受了面試，也接受了身體檢查。我們去到他們家裏，採訪了他們的父母。接着這些青少年長大成人，投入了各行各業。他們有的成了工人，有人做了律師、砌磚工、醫生，其中一位還當上了美國總統。有人染上了酗酒，有人患上了精神分裂。有人從社會底層一路爬到最頂端，也有人朝相反方向走。"],
["The founders of this study would never in their wildest dreams have imagined that I would be standing here today, 75 years later, telling you that the study still continues. Every two years, our patient and dedicated research staff calls up our men and asks them if we can send them yet one more set of questions about their lives.",
"這項研究的創始人做夢也不會想到，75 年之後，我會站在這裏，告訴你們這項研究仍在繼續。每兩年，我們有耐心又盡職的研究人員就會打電話給我們的研究對象，問他們是否願意再多做一套關於他們生活的問卷。"],
["Many of the inner city Boston men ask us, “Why do you keep wanting to study me? My life just isn't that interesting.” The Harvard men never ask that question.",
"許多來自波士頓城中區的人常問我們：「為甚麼你們一直想研究我？我的生活沒那麼有趣。」但哈佛的人從來不會這樣問。"],
["To get the clearest picture of these lives, we don't just send them questionnaires. We interview them in their living rooms. We get their medical records from their doctors. We draw their blood, we scan their brains, we talk to their children. We videotape them talking with their wives about their deepest concerns. And when, about a decade ago, we finally asked the wives if they would join us as members of the study, many of the women said, “You know, it's about time.”",
"為了更清楚地了解這些人的生活，我們不只給他們發問卷。我們還在他們的客廳裏採訪他們，從他們的醫生那兒拿病歷，抽他們的血，掃描他們的大腦，跟他們的孩子聊天。我們拍攝他們和妻子談話的場景，聊的都是他們最關心的問題。大約在 10 年前，我們終於開口問他們的妻子，是否願意加入我們的研究，很多女士都說：「是啊，終於輪到我們了。」"],
["So what have we learned? What are the lessons that come from the tens of thousands of pages of information that we've generated on these lives? Well, the lessons aren't about wealth or fame or working harder and harder. The clearest message that we get from this 75-year study is this: Good relationships keep us happier and healthier. Period.",
"那麼我們得到了甚麼結論呢？那長達幾萬頁、記錄着他們生活的資料，我們從中到底學到了甚麼？不是關於財富、名望，或更加努力工作。從這 75 年的研究中，我們得到最明確的結論就是：良好的人際關係讓人更加快樂和健康。就這樣。"],
["We've learned three big lessons about relationships. The first is that social connections are really good for us, and that loneliness kills. It turns out that people who are more socially connected to family, to friends, to community, are happier, they're physically healthier, and they live longer than people who are less well connected. And the experience of loneliness turns out to be toxic. People who are more isolated than they want to be from others find that they are less happy, their health declines earlier in midlife, their brain functioning declines sooner and they live shorter lives than people who are not lonely. And the sad fact is that at any given time, more than one in five Americans will report that they're lonely.",
"關於人際關係，我們得到三大結論。第一，社交關係對我們非常有益，而孤獨會致命。事實證明，那些跟家人、朋友、社區聯繫更緊密的人，比那些較少往來的人更快樂、身體更健康，也活得更長。而孤獨的感受，被證實是有害的。那些比自己所願更加孤立於他人的人，會發現自己不那麼快樂，健康在中年就更早衰退，大腦功能也更早退化，比不孤獨的人壽命更短。而可悲的是，每 5 個美國人中，就總有 1 個人稱自己是孤獨的。"],
["And we know that you can be lonely in a crowd and you can be lonely in a marriage, so the second big lesson that we learned is that it's not just the number of friends you have, and it's not whether or not you're in a committed relationship, but it's the quality of your close relationships that matters. It turns out that living in the midst of conflict is really bad for our health. High-conflict marriages, for example, without much affection, turn out to be very bad for our health, perhaps worse than getting divorced. And living in the midst of good, warm relationships is protective.",
"而且我們知道，即使身處人群之中，或已經結了婚，你也可能感到孤獨。因此我們得到的第二大結論是：重要的不只是你有多少朋友，也不是你有沒有固定的伴侶，而是你那些親密關係的質素。事實證明，活在衝突當中，對我們的健康非常有害。舉個例子，缺乏愛意、充滿衝突的婚姻，對健康是很差的，可能比離婚還要糟。而活在良好、溫暖的人際關係當中，則對我們有保護作用。"],
["Once we had followed our men all the way into their 80s, we wanted to look back at them at midlife and to see if we could predict who was going to grow into a happy, healthy octogenarian and who wasn't. And when we gathered together everything we knew about them at age 50, it wasn't their middle age cholesterol levels that predicted how they were going to grow old. It was how satisfied they were in their relationships. The people who were the most satisfied in their relationships at age 50 were the healthiest at age 80. And good, close relationships seem to buffer us from some of the slings and arrows of getting old.",
"當我們的研究對象步入 80 歲時，我們會回顧他們的中年生活，看看我們能否預測哪些人會在八九十歲時過得快樂健康，哪些人不會。我們把他們 50 歲時的所有資料匯總分析，發現決定他們將如何老去的，並不是他們中年時的膽固醇水平，而是他們對人際關係的滿意度。那些在 50 歲時滿意度最高的人，在 80 歲時也是最健康的。而良好、親密的關係，似乎能緩衝衰老帶給我們的種種打擊。"],
["Our most happily partnered men and women reported, in their 80s, that on the days when they had more physical pain, their mood stayed just as happy.",
"參與者中那些最幸福的伴侶告訴我們，在他們 80 多歲時，哪怕身體出現各種毛病，他們依舊覺得日子很幸福。"],
["But the people who were in unhappy relationships, on the days when they reported more physical pain, it was magnified by more emotional pain. And the third big lesson that we learned about relationships and our health is that good relationships don't just protect our bodies, they protect our brains.",
"而那些關係不快樂的人，在身體出現更多疼痛的日子，痛苦會被更多的負面情緒放大。關於人際關係和健康，我們得到的第三大結論是：良好的關係不單能保護我們的身體，還能保護我們的大腦。"],
["It turns out that being in a securely attached relationship to another person in your 80s is protective, that the people who are in relationships where they really feel they can count on the other person in times of need, those people's memories stay sharper longer. And the people in relationships where they feel they really can't count on the other one, those are the people who experience earlier memory decline. And those good relationships, they don't have to be smooth all the time. Some of our octogenarian couples could bicker with each other day in and day out, but as long as they felt that they could really count on the other when the going got tough, those arguments didn't take a toll on their memories.",
"事實證明，在 80 多歲時，若能與另一個人維持穩固而親密的關係，會有保護作用。那些在有需要時真的覺得可以依靠對方的人，記憶力會保持得更久、更敏銳。而那些覺得在關鍵時刻無法真正依靠對方的人，就是較早出現記憶衰退的人。而那些良好的關係，並不需要一直都很順暢。我們有些八九十歲的伴侶，即使天天鬥嘴，但只要他們覺得在困難時能真正依靠對方，那些爭吵就不會損害他們的記憶。"],
["So this message, that good, close relationships are good for our health and well-being, this is wisdom that's as old as the hills. Why is this so hard to get and so easy to ignore? Well, we're human. What we'd really like is a quick fix, something we can get that'll make our lives good and keep them that way. Relationships are messy and they're complicated and the hard work of tending to family and friends, it's not sexy or glamorous. It's also lifelong. It never ends. The people in our 75-year study who were the happiest in retirement were the people who had actively worked to replace workmates with new playmates. Just like the millennials in that recent survey, many of our men when they were starting out as young adults really believed that fame and wealth and high achievement were what they needed to go after to have a good life. But over and over, over these 75 years, our study has shown that the people who fared the best were the people who leaned in to relationships, with family, with friends, with community.",
"所以請記住：良好而親密的關係對我們的健康和幸福有益，這是像山一樣古老的智慧。但為甚麼這道理這麼難做到、又這麼容易被忽略呢？因為我們是人類。我們真正想要的，是一種能快速見效的方法，一勞永逸地讓生活變好、並一直維持下去。人際關係麻煩又複雜，用心經營家人和朋友的關係，一點也不亮麗誘人，而且需要一輩子投入，永無止境。在我們長達 75 年的研究中，那些退休後最快樂的人，是那些主動用新玩伴來替代工作伙伴的人。就像調查中那些千禧一代一樣，我們研究的很多人在年輕時，都堅信名望、財富和高成就，才是過上好日子所需要追求的東西。但在這 75 年裏，我們的研究一次又一次證明：日子過得最好的，是那些主動投入人際關係的人——與家人、與朋友、與社區。"],
["So what about you? Let's say you're 25, or you're 40, or you're 60. What might leaning in to relationships even look like?",
"那麼你們呢？也許你現在 25 歲，或者 40 歲，又或者 60 歲。所謂主動投入人際關係，究竟是甚麼樣子呢？"],
["Well, the possibilities are practically endless. It might be something as simple as replacing screen time with people time or livening up a stale relationship by doing something new together, long walks or date nights, or reaching out to that family member who you haven't spoken to in years, because those all-too-common family feuds take a terrible toll on the people who hold the grudges.",
"嗯，方法其實多得數不盡。最簡單的，可以是用與人相處的時間去取代盯着屏幕的時間；或者一起嘗試些新事物，讓一段沉悶的關係重新煥發活力，比如一起去散長步、晚上約個會；又或者主動聯絡那位多年沒說過話的家人，因為這種太過常見的家庭不和，會嚴重傷害那些心懷積怨的人。"],
["I'd like to close with a quote from Mark Twain. More than a century ago, he was looking back on his life, and he wrote this: “There isn't time, so brief is life, for bickerings, apologies, heartburnings, callings to account. There is only time for loving, and but an instant, so to speak, for that.”",
"我想引用馬克・吐溫的一段話來作結。一個多世紀前，他回顧自己的人生，寫下了這段話：「生命如此短暫，實在沒有時間去爭執、道歉、傷心和責難。只有時間去愛；而可以這麼說，就連去愛，也不過一瞬間。」"],
["The good life is built with good relationships.",
"美好人生，是由良好的人際關係建立起來的。"]
]
};

script:[
["Meet Lucas. He's a young man about to enter college.",
"這位是盧卡斯，即將成為大一新生。"],
["He's had a difficult life growing up with his only parent, his mother, and his younger sister, due to his difficulties in facing his adversities.",
"他在單親家庭中長大，生活困苦。家中只有媽媽和妹妹。然而他難以面對生活中的種種壓力。"],
["He's lived a fairly unhealthy life and constantly indulges in partying, drinking and smoking. One day his mother got quite sick and was rushed to the emergency. The most important person in his life, who had rocked through all the difficult times, was on the verge of death. She put up a good fight, but unfortunately passed. And Lucas became the man of the house. Not only did he have to take care of himself, but a sister as well.",
"他過着相當不健康的生活，不斷沉迷於狂歡、喝酒和吸煙。某天他的母親突然重病，被緊急送院。這位陪他熬過所有艱難時刻、生命中最重要的人，正徘徊在死亡邊緣。她奮力抵抗，但最後還是離開了人世。盧卡斯於是成了一家之主。他不但要照顧自己，還要照顧妹妹。"],
["It was summer break, and so Lucas immediately took on a full-time job as janitor. He had to provide for himself, and his younger sister. His only goal was to go to work each day and clean. Day in and day out he went. He took on every opportunity at extra shifts. His discipline and working was unwavering.",
"正值暑假，盧卡斯立刻找了一份全職工作——工友。他得養活自己，還得養活妹妹。他唯一的目標就是每天上班、打掃。日復一日，他從不缺席，並且抓緊每一個加班賺錢的機會。他的紀律和工作意志從不動搖。"],
["He used the money to buy himself and his sister some food for dinner every night. He didn't want to tell his friends. He was working as a janitor, so when they asked if you wanted to go out in the evenings and party, he decided that he would tell them that he had to tutor his little sister and cook her dinner.",
"他每晚都用這些錢為自己和妹妹買晚餐。他不想讓朋友知道自己在當工友，所以每當朋友晚上約他出去玩樂，他都以要教妹妹功課、為她煮晚餐為由婉拒。"],
["Lucas fell into the flow of going to work every day and eventually got used to it. It wasn't the chore for him anymore. He decided to stop buying junk food for himself and his sister, and decided he would cook them a healthy dinner after work each day and then prepare breakfast for the next day. He kept this routine up. Working and then cooking, working and then cooking.",
"盧卡斯漸漸進入了每天上班的節奏，最終也習慣了。工作對他來說再也不是苦差。他決定不再為自己和妹妹買垃圾食物，而是在每天下班後為他們煮一頓健康的晚餐，再準備隔天的早餐。他一直維持着這個作息：工作然後下廚，工作然後下廚。"],
["Finally school time rolled around and Lucas had to attend classes. He was juggling a lot at once, so now he rolled his hours back to part-time, and had to make sure he attended class every single day, so he didn't fall behind. Regardless of how he felt, he always went. He went to class, came home and worked and then cooked dinner and breakfast.",
"終於到了開學的時候，盧卡斯必須上課。他要同時應付很多事，於是把工時改回兼職，並確保自己每一堂課都出席，免得落後於其他同學。不管心情如何，他總是照去。他去上課，回家工作，然後煮晚餐和早餐。"],
["Lucas kept this up for the whole time in college. He was able to put himself through college and graduate with honors. He landed a good-paying job upon graduation and maintained his good habits. Eventually he was able to put his younger sister to college as well. He got married and eventually so did his sister.",
"盧卡斯在整個大學時期都維持着這樣的生活。他靠自己讀完大學，並以優異成績畢業。畢業後他找到一份高薪的工作，也維持着這些良好的習慣。最後他更供妹妹上了大學。他結了婚，妹妹最終也成了家。"],
["They remain best friends throughout life, and they reminisced on how happy their mother would have been of Lucas. How he turned his life around and went from lazy and out of control to in control of his destiny and the true king of his fate. He became disciplined, but how did he do it? The first big thing for Lucas was a strong reason why. When his mother passed, he had a north star to become the man of the house and take care of his younger sister. It was literally do or die.",
"他們一生都是最好的朋友，並一起緬懷——若母親還在，看見盧卡斯會有多開心。他如何扭轉了自己的人生，從懶散、失控，變成掌握自己命運、真正主宰自己際遇的人。他變得如此自律，但他是怎麼做到的？對盧卡斯來說，第一件大事就是一個強烈的「動機」。母親過世時，他有了一顆指路的北極星——成為一家之主，照顧妹妹。這實在是生死攸關，別無選擇。"],
["Studies showed that a strong motivating reason why allows people to tap into willpower reserves that they might otherwise not have been able to. This reminds me of those movies where you see the boxer down to his last bits of energy in the final round, but then he has a flashback, a powerful memory of why he's doing this. Perhaps winning against all odds in memory of someone close to him who passed away.",
"研究顯示，一個強烈的動機能讓人發揮出平時未必能發揮的意志力儲備。這讓我想起那些電影：拳擊手在最後一回合已耗盡最後一點力氣，卻突然閃回一段有力的記憶，想起自己當初為甚麼要成為拳擊手，也許是為了紀念一位逝去的至親，因而排除萬難地取勝。"],
["Studies also show that a strong motivating reason why may only act as a buffer or a temporary solution to increase willpower, and that willpower still does have a finite limit. In our example, Lucas had a strong motivating reason for why he was trying to become more responsible, but that doesn't mean that reason can motivate him to do an infinite amount of things for an infinite amount of time.",
"研究也表明，一個強烈的動機可能只是作為提升意志力的緩衝或臨時方法，而意志力始終有其有限的極限。在我們的例子中，盧卡斯有一個強烈的動機，驅使他變得更有責任感，但這並不代表這個動機能推動他在無限的時間裏做無限的事情。"],
["So he tried to work at a part-time job, take care of his sister, try to get a perfect 4.0 GPA, and learn to play the guitar all at once. It would be difficult if not impossible regardless of how strong his motivating reason why was.",
"於是他嘗試同時打一份兼職、照顧妹妹、努力拿到完美的 4.0 GPA，還要學彈吉他。不管他的動機有多強烈，這樣做即使不是不可能，也會非常困難。"],
["But in our case Lucas started by focusing on one task only, which was work. You want to work every day; once that became a habit he directed his willpower and self-discipline onto another, singular activity which was cooking, followed by school. And that's the key to be wise with how we spend our self-discipline.",
"但在我們的例子中，盧卡斯一開始只專注於一項任務，那就是工作。你想每天工作，一旦這成了習慣，他便把意志力和自制力轉移到另一項單一的活動上——那就是下廚，接着是上學。這正是明智地運用自律的關鍵。"],
["And to use it on singular activities and turn them into habits before moving on to another activity. The first habit could have been a simple, as drinking water every day or making his bed every morning. When an activity becomes a habit, it drains a lot less willpower.",
"一次只把它用在一件事上，把它變成習慣，再進行下一件事。第一個習慣可以很簡單，像是每天喝水，或每天早上整理床鋪。當一件事變成習慣，它消耗的意志力就會少得多。"],
["Lucas also faced a dilemma that many people trying to be disciplined encounter. Peer pressure. His friends represented a temptation into his old life. An easier life requiring a lot less responsibility.",
"盧卡斯也面對許多想要自律的人都會遇到的兩難：同儕壓力。他的朋友代表着回到舊生活的誘惑——一種輕鬆得多、責任也少得多的生活。"],
["There were two reasons Lucas was able to overcome this dilemma. He had a strong reason why and he planned for temptation; in fact he used the very specific technique known as the if-then technique.",
"盧卡斯能克服這個兩難，有兩個原因：他有強烈的動機，而且他為誘惑做好了準備。事實上，他用了一個非常具體的方法，叫做「假如—則」技巧。"],
["He had planned that if his friends asked him to go out and party, then he would tell them that he had to tutor his sister and cook dinner. This is a pre-planned decision of self control, and avoided him having to exercise willpower to resist the temptation. This is a great strategy to use, when we anticipate that there will be times when temptations will arise and our willpower might be low. It's an automatic and pre-planned response to temptation.",
"他事先計劃好：假如朋友約他出去玩樂，他就會告訴他們自己得教妹妹功課、煮晚餐。這是一個預先做好的自我控制決定，讓他不必動用意志力去抵抗誘惑。當我們預期將會有誘惑出現、而意志力可能薄弱的時刻，這是一個相當好的策略。它是一種自動而預先計劃好的應對誘惑方式。"],
["Studies show that practicing self-discipline increases self-discipline in subsequent acts. It's like a muscle.",
"研究顯示，練習自制力會令往後的自制行為變得更容易。它就像肌肉一樣。"],
["By finding his strong reason why. Developing his discipline through singular activities. And pre-planning for temptations.",
"靠着尋找他強大的動機；透過單一的活動培養自律；並為誘惑預先做好計劃。"],
["Lucas was able to become more disciplined and overcome his adversities.",
"就這樣，盧卡斯變得更加自律，也度過了自己種種的逆境與難關。"]
]
};

script:[
["In the summer of 2017, a woman was murdered by her partner in Sofia. The woman, let's call her “V,” was beaten for over 50 minutes before she died. The morning after, her neighbors told the press that they heard her screams, but they didn't intervene. You see, in Bulgaria and many other societies, domestic violence is typically seen as a private matter. Neighbors, however, are quick to react to any other kind of noise.",
"那是 2017 年的夏天，在索菲亞，一個女人被她的伴侶謀殺了。讓我們把這個女人稱作「V」，在她死亡之前，她被毆打長達 50 分鐘。第二天早上，她的鄰居告訴媒體，說他們聽到了她的尖叫，但他們沒有干預。你看，在保加利亞和許多其他社會裏，家庭暴力普遍被看作是一件私事。然而，鄰居卻總是迅速對任何其他噪音作出反應。"],
["We wanted to expose and affect the absurdity of this. So we designed an experiment. We rented the apartment just below V's for one night. And at 10pm, Maksim, the artist in our group, sat on the drum set we had assembled in the living room and started beating it. Ten seconds. Thirty seconds. Fifty seconds. A minute. A light came on in the hallway. One minute and 20 seconds. A man was standing at the door, hesitant to press the bell. One minute and 52 seconds. The doorbell rang, a ring that could have saved a life.",
"我們想要去揭露、去改變這件荒謬的事情。所以我們設計了一個實驗。我們把「V」公寓正下方的那間房租了一個晚上。晚上 10 點的時候，馬克西姆，我們組裏的藝術工作者，坐在我們在客廳架好的鼓前，開始敲鼓。10 秒。30 秒。50 秒。1 分鐘。走廊亮起了一束燈光。1 分鐘 20 秒。一個男人站在門口，猶豫着要不要按門鈴。1 分鐘 52 秒。門鈴響了，這一響，本可以挽救一條生命。"],
["“Beat.,” is our project exploring the ominous silence surrounding domestic violence. We filmed the experiment, and it became instantly viral. Our campaign amplified the voices of survivors who shared similar stories online.",
"「Beat.」是我們的項目，探討圍繞家庭暴力的那份不祥的沉默。我們把這個實驗拍成影片，它瞬間爆紅。我們的宣傳活動放大了那些在網上分享類似經歷的倖存者的聲音。"],
["It equipped neighbors with specific advice, and many committed to taking action. In a country where every other week, the ground quietly embraces the body of a woman murdered by a partner or a relative, we were loud, and we were heard.",
"它為鄰居提供了具體的建議，許多人也承諾要採取行動。在一個每隔一週、土地就靜靜擁抱一具被伴侶或親人謀殺的女性遺體的國家裏，我們的聲音很響亮，而且我們被聽見了。"],
["I am an activist, passionate about human rights innovation. I lead a global organization for socially engaged creative solutions. In my work, I think about how to make people care and act. I am here to tell you that creative actions can save the world, creative actions and play. I know it is weird to talk about play and human rights in the same sentence, but here is why it's important. More and more, we fear that we can't win this. Campaigns feel dull, messages drown, people break.",
"我是一個活動家，熱衷於人權創新。我領導着一個致力於社會參與式創意方案的全球組織。在工作中，我思考如何讓人們關心並行動起來。我來這裏，是要告訴你：創意行動可以拯救世界，創意行動與玩樂。我知道把玩樂和人權放在同一句話裏很奇怪，但這正是它重要的原因。我們越來越害怕自己贏不了這場仗。宣傳活動變得枯燥，信息被淹沒，人們精神崩潰。"],
["Numerous studies, including a recent one published by Columbia University, show that burnout and depression are widespread amongst activists. Years ago, I myself was burned out. In a world of endless ways forward, I felt at my final stop.",
"很多研究，包括哥倫比亞大學最近發表的一項，都顯示：倦怠和抑鬱在活動家群體中十分普遍。幾年前，我自己也曾經倦怠。在一個仍有無數條路可走的世界裏，我卻覺得自己走到了最後一站。"],
["So what melts fear or dullness or gloom? Play. From this very stage, psychiatrist and play researcher Dr. Stuart Brown said that nothing lights up the brain like play, and that the opposite of play is not work, it's depression. So to pull out of my own burnout, I decided to turn my activism into what I call today “play-tivism.”",
"那麼，是甚麼化解了恐懼、枯燥或憂鬱呢？玩樂。就在這個講台上，精神科醫生兼玩樂研究者 Stuart Brown 博士說過，沒有甚麼比玩樂更能點亮大腦，而玩樂的對立面不是工作，而是抑鬱。所以，為了讓自己走出倦怠，我決定把我的行動主義變成我今天所說的「玩樂主義」（play-tivism）。"],
["When we play, others want to join. Today, my playground is filled with artists, techies and scientists. We fuse disciplines in radical collaboration. Together, we seek new ways to empower activism. Our outcomes are not meant to be playful, but our process is. To us, play is an act of resistance. For example, “Beat.,” the project I talked about earlier, is a concept developed by a drummer and a software engineer who didn't know each other two days before they pitched the idea.",
"當我們玩樂時，其他人都想加入。今天，我的遊樂場上滿是藝術家、科技人和科學家。我們在激進的協作中融合不同的學科。我們一起尋找新方法，為行動主義賦能。我們的成果並非要好玩，但我們的過程是好玩的。對我們來說，玩樂是一種反抗的行動。例如，我早前提到的項目「Beat.」，就是由一位鼓手和一位軟件工程師構思出來的，而他們在提出這個點子的兩天之前還互不相識。"],
["“Beat.,” is the first winner in our lab series where we pair artists and technologists to work on human rights issues. Other winning concepts include a pop-up bakery that teaches about fake news through beautiful but horrible-tasting cupcakes -- or a board game that puts you in the shoes of a dictator so you get to really grasp the range of tools and tactics of oppression.",
"「Beat.」是我們實驗室系列中的第一個優勝作品；在這個系列裏，我們把藝術家和技術專家配對起來，一同處理人權議題。其他優勝的構思包括：一間快閃麵包店，用美麗卻難吃得可怕的杯子蛋糕來教人認識假新聞；又或者一款桌上遊戲，讓你站在獨裁者的位置，從而真正掌握各種壓迫的工具和手段。"],
["We did our first lab just to test the idea, to see where it cracks and if we can make it better. Today, we are so in love with the format that we put it all online for anyone to implement. I cannot overstate the value of experimentation in activism. We can only win if we aren't afraid to lose.",
"我們做第一個實驗室，只是為了測試這個構想，看看它會在哪裏出現裂縫，以及我們能否把它做得更好。今天，我們如此深愛這個模式，於是把它全部放上網，讓任何人都可以實行。我無法過分強調實驗在行動主義中的價值。只有在不害怕失敗的時候，我們才能贏。"],
["When we play, we learn. A recent study published by Stanford University about the science of what makes people care reconfirms what we have been hearing for years: opinions are changed not from more information but through empathy-inducing experiences.",
"當我們玩樂時，我們學習。史丹福大學最近發表的一項關於「是甚麼令人們關心起來」的科學研究，再次證實了我們多年來一直聽到的事實：觀念的改變不是來自更多的資訊，而是來自能引發同理共鳴的經歷。"],
["So learning from science and art, we saw that we can talk about global armed conflict through light bulbs, or address racial inequality in the US through postcards, or tackle the lack of even one single monument of a woman in Sofia by flooding the city with them, and, with all these works, to trigger dialogue, understanding and direct action.",
"所以，從科學和藝術中我們明白到，我們可以透過燈泡來談論全球武裝衝突，或透過明信片回應美國的種族不平等，又或者針對索菲亞連一座女性雕像都沒有的問題，用女性雕像鋪滿整座城市來回應；並藉着這一切作品，去觸發對話、理解和直接行動。"],
["Sometimes, when I talk about taking risks and trying and failing in the context of human rights, I meet raised eyebrows, eyebrows that say, “How irresponsible,” or, “How insensitive.” People often mistake play for negligence. It is not. Play doesn't just grow our armies stronger or spark better ideas. In times of painful injustice, play brings the levity we need to be able to breathe. When we play, we live.",
"有時，當我在人權的脈絡下談到冒險、嘗試和失敗時，我會迎來一些揚起的眉毛，那些眉毛彷彿在說：「真不負責任！」或者「真麻木不仁！」人們常常把玩樂誤當作疏忽怠慢。其實不是。玩樂不只是讓我們的軍隊更強大，或激發更好的點子。在令人痛心的不公之中，玩樂帶來我們得以喘息所需的那份輕盈。當我們玩樂時，我們活着。"],
["I grew up in a time when all play was forbidden. My family's lives were crushed by a communist dictatorship. For my aunt, my grandfather, my father, we always held two funerals: one for their bodies, but, years before that, one for their dreams. Some of my biggest dreams are nightmares.",
"我成長於一個所有玩樂都被禁止的年代。我一家人的生活被一個共產獨裁政權碾碎。為我的姑姑、我的祖父、我的父親，我們總是辦兩場葬禮：一場為他們的身體，但在那之前的許多年，另一場是為他們的夢想。我最大的一些夢想，其實是噩夢。"],
["I have a nightmare that one day all the past will be forgotten and new clothes will be dripping the blood of past mistakes. I have a nightmare that one day the lighthouses of our humanity will crumble, corroded by acid waves of hate.",
"我有一個噩夢：有一天，所有的過去都會被遺忘，而新衣服上，正滴着過往錯誤的鮮血。我有一個噩夢：有一天，我們人性的燈塔會崩塌，被仇恨的酸性浪潮侵蝕。"],
["But way more than that, I have hope. In our fights for justice and freedom, I hope that we play, and that we see the joy and beauty of us playing together. That's how we win.",
"但比這一切更重要的是，我懷抱希望。在我們爭取公義與自由的抗爭中，我希望我們玩樂，也希望我們看見我們一起玩樂時的喜悅與美好。這，就是我們獲勝的方式。"]
]
};

script:[
["Imagine that you're getting ready to go to a party. You feel excited, but also nervous, and you've got this feeling in your stomach almost like another heartbeat. There's something holding you back, holding you back from getting too happy. “No, you mustn't get too happy. better to be cautious, otherwise, something bad might happen.” You start wondering, “Who should I talk to when I get there? What if no one wants to talk to me? What if they'll think I'm weird?”",
"想像一下，你正準備去參加一個派對，你感到興奮，但也緊張，你的胃裏有種感覺，就像又一次心跳。有東西在阻止你，阻止你變得太快樂，「不，你不能太高興。最好還是小心點，否則會發生不好的事情。」你開始想：「當我到了那裏，我應該和誰說話？如果沒人想跟我說話怎麼辦？如果他們覺得我很奇怪怎麼辦？」"],
["When you arrive at the party, someone comes up to you and starts talking with you, and as this is happening, your mind starts racing, your heart begins pounding, you start sweating, and it feels almost like you're dissociating from yourself, like it's an out-of-body experience, and you're just watching yourself talk. “Keep it together,” you say to yourself, but you can't.",
"到達聚會時，有人走上前來，並開始與你交談，就在這時，你的大腦開始飛馳，心臟開始跳動，你開始出汗，感覺就像你正在與自己分離，就像是一種靈魂出竅的體驗，而你只是看着自己說話。「保持鎮定，」你對自己說，但你做不到。"],
["And it's just getting worse: after a few minutes of conversation, the person you've been speaking to leaves, and you feel utterly defeated.",
"而且情況越來越糟：交談幾分鐘後，和你交談的人離開了，你感到徹底的挫敗。"],
["This has been happening to you in social situations for a long time. Or imagine every time you go out, and you're in crowded places, you feel this panic starting to arise.",
"長期以來，這種情況一直發生在你的社交場合中。又或者想像一下，每次你出門，身處擠迫的地方，你都感到這種恐慌開始湧現。"],
["When you're surrounded by lots of people, like on a bus, you start to feel hot, nauseous, uneasy, and to prevent this from happening, you start avoiding a lot of places which makes you feel lonely and isolated.",
"當你被很多人包圍時，比如在巴士上，你開始感到燥熱、噁心、不安，為了防止這種情況發生，你開始迴避許多地方，這讓你感到孤獨和孤立。"],
["You or the person in both of these scenarios have anxiety disorders, and what I can tell you is that anxiety is very common, much more than people think. Right now, one in 14 people around the world have an anxiety disorder, and each year, it costs over 42 billion dollars to treat this mental health problem.",
"無論是你，還是這兩種情況下的人，都患有焦慮症。我可以告訴你，焦慮非常普遍，比人們想像的要多得多。現在，全世界每14個人中就有一個人患有焦慮症，而每年，治療這種心理健康問題要花費超過420億美元。"],
["To show you the impact that anxiety has on someone's life, I will just mention that anxiety can lead to depression, school dropout, suicide. It makes it harder to focus, and to hold down a job, and it can lead to relationship breakdown.",
"為了向你們展示焦慮對生活的影響，我只想提到，焦慮可以導致抑鬱、輟學和自殺。它會令人更難集中注意力，更難保住工作，還可能導致關係破裂。"],
["But a lot of people don't know this, that's why, a lot of times, people sweep anxiety under the rug as just nerves that you need to get over, as a weakness, but anxiety is so much more than that.",
"但很多人並不知道這一點，這就是為甚麼很多時候，人們把焦慮掩蓋起來，認為焦慮只是你需要克服的神經緊張，是一種弱點，但焦慮遠不止於此。"],
["A reason why so many people don't think it's important is that they don't know what it is. Is it your personality? Is it an illness? Is it a normal sensation? What is? That's why it's important to differentiate what is normal anxiety from what is an anxiety disorder.",
"這麼多人不認為它重要的一個原因，是他們不知道它到底是甚麼。是你的個性嗎？是一種疾病嗎？是一種正常的感覺嗎？到底是甚麼？這就是為甚麼區分甚麼是正常的焦慮、甚麼是焦慮症如此重要。"],
["Normal anxiety is an emotion that we all get when we're in stressful situations. For example, let's say, you're out in the woods, and you come face-to-face with a bear. This will probably make you feel a little bit anxious, and you'll probably want to start running like crazy. This anxious feeling that you get is good because it protects you, it saves you, and it makes you on a hightail it out of there, although maybe it's not such a good idea to start running when you see a bear. I really don't think you can outrun a bear.",
"正常的焦慮是一種情緒，是當我們處於緊張情況下都會有的情緒。舉個例子，假設你身處樹林中，與一頭熊面對面。這大概會讓你感到有點焦慮，你大概會想瘋狂地拔腿就跑。這種焦慮的感覺是好的，因為它保護你、拯救你，讓你趕快逃離那裏——儘管當你看到熊時開始跑並不是甚麼好主意，我真的不認為你能跑得過一頭熊。"],
["Anxiety helps us meet our deadlines at work and deal with emergencies in life, but when this anxiety emotion is taken to the extreme and arises in situations which don't pose a real threat, then that's when you might have an anxiety disorder.",
"焦慮幫助我們在工作上趕上截止期限，處理生活中的緊急情況，但當這種焦慮情緒被推向極端，並出現在並不構成真正威脅的情況下，那麼你就可能患有焦慮症。"],
["For example, people with generalized anxiety disorder worry excessively and constantly about everything going on in their lives, and they find it very difficult to control this worry. They also have symptoms like restlessness, fear, they find it hard to fall asleep at night, and they can't concentrate on tasks. In spite of whatever kind of anxiety you might be suffering from, there is something that you can do to lower it.",
"舉個例子，患有「廣泛性焦慮症」的人，對生活中發生的一切都過度而不斷地擔憂，他們發現很難控制這種擔憂。他們還會出現躁動不安、恐懼等症狀，晚上難以入睡，也無法專注於任務。無論你正在受哪一種焦慮困擾，你都可以做一些事情來降低它。"],
["It works, and it's simpler than you may think. All too often, we're given medication for mental disorders, but it doesn't always work in the long run. Symptoms often come back, and you're back to where you started. So here's something else to consider: the way you cope or handle things has a direct impact on how much anxiety you're experiencing, and if you tweak the way you're coping, then you can lower your anxiety.",
"這確實有效，而且比你想像的要簡單。我們常常為精神障礙服用藥物，但長遠來看並不總是有效。症狀常常復發，你又回到了起點。所以還有另一件事值得考慮：你應對或處理事情的方式，對你所經歷的焦慮程度有直接的影響，如果你調整應對的方式，你就可以降低你的焦慮。"],
["In our study at the University of Cambridge, we showed that women living in poor areas have a higher risk for anxiety than women living in richer areas. These results didn't surprise us, but when we looked closer, we found that women living in poor areas, if they had a particular set of coping resources, they didn't have anxiety, while women living in poor areas without these coping resources had anxiety.",
"在我們劍橋大學的研究中，我們發現生活在貧困地區的女性，比生活在較富裕地區的女性有更高的焦慮風險。這些結果並不令我們意外，但當我們仔細觀察，我們發現生活在貧困地區的女性，如果她們擁有一套特定的應對資源，就不會有焦慮；而生活在貧困地區、卻沒有這些應對資源的女性，則會有焦慮。"],
["Other studies showed that people who had faced extreme circumstances, who had faced adversity, been through wars and natural disasters, if they had coping resources, they remained healthy and free of mental disorders, while others, facing the same hardships but without coping skills went on a downward spiral and developed mental disorders.",
"其他研究顯示，那些曾面對極端處境、面對逆境、經歷過戰爭和自然災害的人，如果他們擁有應對資源，就能保持健康，免於精神障礙；而其他人，面對同樣的苦難，卻沒有應對技巧，就會每況愈下，並患上精神障礙。"],
["So what are some of these coping resources, and how can we use them to lower our anxiety? And before I dive into what they are, I'd like to point out - and I think this is so interesting - you can develop these coping resources or coping skills on your own through the things that you do; you can take charge of your anxiety and lower it, which I think is so empowering.",
"那麼，這些應對資源有哪些？我們又如何運用它們來降低焦慮呢？在我深入探討它們是甚麼之前，我想指出一點——我覺得這很有趣——你可以透過你所做的事情，靠自己培養這些應對資源或應對技巧；你可以掌控你的焦慮並降低它，我覺得這非常賦權。"],
["Today I'll be talking about three coping resources, and the first one is feeling like you're in control of your life. People who feel like they're more in control of their life have better mental health. If you feel like you're lacking in control in life, then research shows that you should engage in experiences that give you greater control. I'll show you what I mean: do you sometimes find that you put off starting something because you just don't feel ready enough? Do you find it hard to make decisions like what to wear, what to eat who to date, which job to take up? Do you tend to waste a lot of time deciding what you might do while nothing gets done? A way to overcome indecision and this lack of control in life, is to do it badly.",
"今天我要談三種應對資源，第一種是感覺自己掌控着自己的生活。那些覺得自己更能掌控生活的人，心理健康狀況更好。如果你覺得自己在生活中缺乏掌控感，那麼研究顯示，你應該多參與那些能給你更大掌控感的經歷。我來告訴你我的意思：你是否有時會因為覺得自己還沒準備好，而推遲開始做某件事？你是否覺得很難做決定，比如穿甚麼、吃甚麼、和誰約會、做甚麼工作？你是否會浪費很多時間去決定自己可以做甚麼，結果甚麼也沒完成？克服猶豫不決和這種生活中缺乏掌控感的一個方法，就是把它做得很糟糕。"],
["There's a quote by writer and poet GK Chesterton that says, “Anything worth doing is worth doing badly the first time.” The reason why this works so well is that it speeds up your decision-making and catapults you straight into action, otherwise, you can spend hours deciding how you should go about doing something or what you should do.",
"作家兼詩人切斯特頓（GK Chesterton）有一句名言：「任何值得做的事，都值得在第一次做得很糟糕。」這個方法之所以如此有效，是因為它能加快你的決策速度，把你直接推向行動；否則，你可能會花上好幾個小時去決定應該怎樣做某件事，或應該做甚麼。"],
["This can be paralyzing and can make you afraid to even begin. All too often, we aim for perfection, but never end up doing anything because the standards that we set for ourselves are too high, they're intimidating, which stresses us out so we delay starting something, or we might even abandon the whole thing altogether. Do it badly frees you up to take action.",
"這可能會讓你動彈不得，甚至讓你害怕開始。我們常常追求完美，卻從來沒有完成任何事情，因為我們為自己設定的標準太高，令人生畏，讓我們壓力重重，於是我們推遲開始某件事，甚至可能徹底放棄整件事。把它做得很糟糕，能讓你放開手去採取行動。"],
["I mean you know how it is: so often, we want to do something perfectly we can't start until it's the perfect time, until we've got all the skills, but this can be daunting and stressful so why not just jump into it just do it however, without worrying if it's good or bad? This will make it that much easier to start something and as you're doing it badly to finish it, and when you look back, you'll realize, more often than not, that actually it's not that bad.",
"我的意思是，你知道情況是這樣的：很多時候，我們想把事情做得很完美，於是不到最完美的時機、不到我們掌握所有技巧，就無法開始；但這可能令人卻步又充滿壓力，那為甚麼不乾脆一頭栽進去，不管好壞就去做呢？這會讓你開始一件事變得容易得多，而當你把它做得很糟糕地完成後，回頭一看，你會發現，通常情況下，它其實並沒有那麼糟糕。"],
["A close friend of mine who has anxiety started using this motto, and this is what she said, “When I started using this motto, my life transformed. I found I could complete tasks in much shorter time periods than before.",
"我一位患有焦慮症的密友開始使用這句座右銘，她是這樣說的：「當我開始使用這句座右銘時，我的生活徹底改變了。我發現我能在比以前短得多的時間內完成任務。"],
["Do it badly gave me wings to take risks, to try something differently, and to have way more fun during the whole process. It took the anxiety out of everything and replaced it with excitement.” So do it badly, and you can improve as you go along. I'd like to ask you to think about this: if you start using this motto today, how would your life change?",
"『做得很糟糕』給了我冒險的翅膀，讓我嘗試不同的事物，並在整個過程中獲得多得多的樂趣。它把一切的焦慮都抽走，取而代之的是興奮。」所以，做得很糟糕吧，你可以在前進的過程中不斷進步。我想請你想一想：如果你從今天開始使用這句座右銘，你的生活會有怎樣的改變？"],
["The second coping strategy is to forgive yourself, and this is very powerful if you use it. People with anxiety think a lot about what they're doing wrong, their worries, and how bad they're feeling. Imagine if you had a friend who constantly pointed out everything you're doing wrong, and everything that was wrong with your life. You would probably want to get rid of this person right away, wouldn't you? Well, people with anxiety do this to themselves all day long. They're not kind to themselves. So maybe it's time to start being kinder with ourselves, time to start supporting ourselves, and a way to do this is to forgive yourself for any mistakes you think you might have made just a few moments ago to mistakes made in the past.",
"第二種應對策略是原諒自己，如果你運用得當，這是非常有力的。患有焦慮症的人常常想着自己做錯了甚麼、自己的擔憂，以及自己感覺有多糟糕。想像一下，如果你有一個朋友，不斷指出你做錯的每一件事，以及你生活中每一件出了問題的事。你大概會想馬上擺脫這個人，不是嗎？然而，患有焦慮症的人整天都這樣對待自己。他們對自己並不友善。所以，也許是時候開始對自己好一點了，是時候開始支持自己了，而做到這一點的一個方法，就是原諒自己剛剛幾分鐘前所犯的錯誤，以至過去所犯的錯誤。"],
["If you had a panic attack and are embarrassed about it, forgive yourself; if you wanted to talk to someone, but couldn't muster up the courage to do so, don't worry about it, let it go; forgive yourself for anything and everything and this will give you greater compassion towards yourself. You can't begin to heal until you do this.",
"如果你曾恐慌發作而為此感到尷尬，原諒自己；如果你想和某人說話，卻鼓不起勇氣去做，別擔心，放下它吧；原諒自己的一切，這會讓你對自己有更大的同情。你不這樣做，就無法開始痊癒。"],
["And last but not least, having a purpose and meaning in life is a very important coping mechanism. Whatever we do in life, whatever work we produce, however much money we make, we cannot be fully happy until we know that someone else needs us, that someone else depends on our accomplishments, or on the love that we have to share. It's not that we need other people's good words to keep going in life, but if we don't do something with someone else in mind, then we're at much higher risk for poor mental health.",
"最後但同樣重要的是，在生活中擁有目標和意義，是一種非常重要的應對機制。無論我們在生活中做甚麼，無論我們創造甚麼作品，無論我們賺多少錢，我們都無法真正快樂，直到我們知道有另一個人需要我們，有另一個人依靠我們的成就，或依靠我們願意付出的愛。並不是說我們需要別人的好話才能在生活中繼續走下去，而是如果我們做事時心中沒有想着別人，那麼我們出現心理健康問題的風險就會高得多。"],
["The famous neurologist Dr. Victor Frankel said, “For people who think there's nothing to live for and nothing more to expect from life, the question is getting these people to realize that life is still expecting something from them.”",
"著名的神經學家維克多·弗蘭克爾（Victor Frankel）醫生曾說：「對於那些認為沒有甚麼值得活下去、也再沒有甚麼可以期待的人來說，關鍵在於讓這些人意識到，生活仍然對他們有所期待。」"],
["Doing something with someone else in mind can carry you through the toughest times. You'll know the why for your existence and will be able to bear almost any how; almost any how. So the question is do you do at least one thing with someone else in mind?",
"帶着別人的存在去做一件事，能夠帶你度過最艱難的時刻。你會知道你存在的「為甚麼」，並且能夠承受幾乎任何「怎麼辦」；幾乎任何「怎麼辦」。所以問題是：你有沒有至少做一件心中想着別人的事？"],
["This could be volunteering, or it could be sharing this knowledge that you gained today with other people, especially those who need it most, and these are often the people who don't have money for therapy, and they're usually the ones with the highest rates of anxiety disorders. Give it to them, share with others, because it can really improve your mental health.",
"這可以是做義工，也可以是把你今天學到的知識分享給其他人，尤其是那些最需要的人；這些人往往是沒有錢接受治療的人，而他們通常正是焦慮症發病率最高的一群。把它給他們，與別人分享，因為這真的可以改善你的心理健康。"],
["So I would like to conclude with this: another way you can do something with someone else in mind is finishing work that might benefit future generations. Even if these people will never realize what you've done for them, it doesn't matter, because you will know, and this will make you realize the uniqueness and importance of your life.",
"所以我想以此作結：另一種心中想着別人去做事的方式，就是完成一些可能造福後代的工作。即使這些人永遠不會意識到你為他們所做的一切，那也沒關係，因為你會知道，而這會讓你意識到你生命的獨特與重要。"]
]

script:[
["I've moved about 20 times in my life. And each time that I move to a new neighborhood, a new city, a new country, it seems to get harder and harder to sustain the friendships I left behind. But right now, sustaining those friendships seems especially important and especially difficult. So I'm wondering what is manageable? How can I keep those friendships afloat without getting overwhelmed?",
"在我的人生中，我大概搬了 20 次家。每一次搬到一個新的社區、新的城市、新的國家，要維繫我留在身後的那些友情，似乎都變得越來越難。但眼下，維繫這些友情既顯得格外重要，也格外困難。所以我在想：怎樣做才算力所能及？我可以怎樣讓那些友情維持下去，而不至於把自己壓得喘不過氣？"],
["To find out, I turned to my two most trusted sources: data and my mum. Now, since she hates being on camera, this puppet is going to be as good as it gets. But before she weighs in, I wanted to look at the studies on how friendships fall apart in the hopes that I might be able to avoid some of those pitfalls.",
"為了找出答案，我求助於我最信任的兩個來源：數據，還有我媽媽。由於她討厭上鏡，所以這個木偶已經是最接近本尊的了。不過在她發表意見之前，我想先看看那些關於友情如何破裂的研究，希望自己能夠避開當中的一些陷阱。"],
["According to one study, friendships often dissolve because of a lack of opportunity to meet, hang out and connect. Which may explain why, after a year of isolation, some of my friendships feel like they're hanging on by a thread. The same researcher made headlines with the finding that we lose half of our friendships every seven years.",
"一項研究顯示，友情往往會漸漸消散，是因為缺少見面、聚會與聯繫的機會。這或許可以解釋，為甚麼在一年的疏離之後，我有些友情感覺就像命懸一線。同一位研究員亦以另一項發現登上頭條：我們每隔七年，就會失去一半的朋友。"],
["Now, before you start doomscrolling through your contact list, you should know that's not quite as severe as it sounds. Over those seven years, the size of our friendship group actually stays pretty stable. So if you have 20 or 30 good friends now, seven years later, you still probably have 20 or 30 good friends. The catch, though, is that 52 percent of those faces will be different. Over seven years, we will replace many of the people in our network with new ones.",
"別急着狂刷你的通訊錄，你要知道，情況其實沒有聽起來那麼嚴重。在那七年裏，我們朋友圈的規模其實相當穩定。所以如果你現在有 20 或 30 個好朋友，七年之後，你多半仍然會有 20 或 30 個好朋友。不過當中的玄機是，其中 52% 的面孔會是不同的。在這七年裏，我們會用新朋友取代網絡中許多的人。"],
["As someone who has had to work more and more from home, the opportunity to go out and make new friends is pretty limited. It's a luxury I don't often have. And the research on the formation of new friends suggest that this takes time. A lot of time.",
"作為一個越來越多時間要在家工作的人，我能夠外出結識新朋友的機會相當有限，這是我難得才有的一種奢侈。而關於如何建立新友誼的研究顯示，這需要時間——很多很多的時間。"],
["A recent study found that you have to spend between 40 and 60 hours with someone before they can go from an acquaintance to a casual friend. They get upgraded to a fully fledged friend around 80 to 100 hours, and get elevated to a best friend after you spend at least 200 hours of quality time together.",
"最近一項研究發現，你必須和一個人相處 40 至 60 小時，對方才能從「相識」變成「一般朋友」；大約在 80 至 100 小時左右，關係會升級為真正的朋友；而要成為「摯友」，則要在一起共度至少 200 小時有素質的時間。"],
["And the emphasis here is on quality time. You might say “hi” to a barista every morning or be polite to a coworker, but you wouldn't necessarily invite either one over for dinner.",
"這裏強調的是「有素質」的相處時間。你可能每天早上都會跟咖啡師說聲「嗨」，或對同事以禮相待，但你不一定會邀請他們任何一位到家中吃晚飯。"],
["I was feeling a little bit daunted by all of these numbers until I spoke to my mum, who has a more optimistic take on all of this. A friendship is essential in your life. How does friendship start? The first thing is to know that person. If you don't want to know these people, if you don't open a window of communication, you will never become friends of them. You have to start. You want to be isolated, you just shut your windows and look at them, and they don't look at you.",
"這些數字讓我有點卻步，直到我跟媽媽談過——她對這一切看得比較樂觀。「友情在你的生命裏是不可或缺的。友情是怎樣開始的呢？第一步就是去認識那個人。如果你不想認識這些人，如果你不打開一扇溝通的窗，你永遠都不會和他們成為朋友。你必須踏出第一步。你若想把自己孤立起來，就只會關上窗，看着他們，而他們也不看你。」"],
["OK, so yes, if I really, really want to make a new friendship, I could go out and make the effort to make a new friend by, say, knocking on my neighbor's door, who plays really good music a bit too loudly. But what about my current group of friends? Are we all doomed just because we don't get the chance to hang out like we used to?",
"好吧，所以說，如果我真的真的很想結交一段新友情，我大可以走出去、主動一點去交新朋友，比方說去敲一敲鄰居的門——就是那位音樂品味很好、卻放得有點太大聲的鄰居。可是我現有的這一群朋友呢？難道只因為我們不再像從前那樣有機會聚在一起，就注定要疏遠嗎？"],
["“I think yes, with the friends, the distance gets further and further if you are not meeting them. But it also shows you the ones that don't disappear because of the time or the distance. They will be there for you if you need them. So the special friends. And this difficult time shows you who cares and who is a good person or a good friend.”",
"「我想是的。和那些朋友之間，如果你不再見面，距離就會越來越遠。但這也會讓你看清，哪些人不會因為時間或距離而消失。當你需要他們時，他們就會在你身邊——那些就是特別的朋友。而這段困難的日子，會讓你知道誰是真心在乎你的人，誰才是好人、好朋友。」"],
["I think she's right. I don't think there's a magical formula or a mythical number of hours to chase. This just takes time and effort. So if you'll excuse me, I have a good friend that I need to call.",
"我覺得她說得對。我不認為有甚麼魔法公式，或一個要拚命追逐的神奇時數。這一切，就是需要時間和心力而已。所以，恕我先失陪——我有一位好朋友要打電話給他呢。"]
]
};

script:[
["Cloe Shasha Brooks: Hello, welcome. You are watching a TED interview series called How to Deal with Difficult Feelings. I'm Cloe Shasha Brooks, your host and a curator at TED. And today we'll be focusing specifically on anxiety. So first I'll be speaking with author and model Naomi Shimada about the anxiety associated with social media. She coauthored a book called “Mixed Feelings: Exploring the emotional impact of our digital habits.” It's all about how the internet has created a new layer of perfectionist pressure on our lives and how we can better manage our relationship with our online worlds. Hello, Naomi. Great to see you.",
"克洛．莎莎．布魯克斯：大家好，歡迎收看。你正在收看的是 TED 的訪談系列《如何面對負面情緒》。我是主持人、TED 策展人克洛．莎莎．布魯克斯。今天我們會集中討論焦慮這個問題。首先，我會訪問作家兼模特兒島田直美，聊聊與社交媒體有關的焦慮。她合著了一本書，叫《五味雜陳：探索我們的數碼習慣對情緒的影響》。這本書講的是互聯網如何在我們的生活中製造出一層新的完美主義壓力，以及我們可以怎樣更妥善地與網絡世界相處。你好，直美，很高興見到你。"],
["Naomi Shimada: Hello, Cloe, great to see you, too. I'm honored to be here.",
"島田直美：你好，克洛，同樣很高興見到你，非常榮幸能來到這裏。"],
["CSB: Oh, well, thanks for joining us. So, Naomi, you have written and spoken about the relationship between social media and anxiety a whole bunch, such as the anxiety to post online or not to post. So can you tell us a little bit more about that?",
"克洛：好的，謝謝你應邀出席。直美，你曾經寫過文章，也發表過言論，詳細講述社交媒體與焦慮之間的關係，例如在決定「發帖還是不發帖」時的那種焦慮。對此你能不能再跟我們多聊一聊？"],
["NS: So I always want to start by saying, even though I have written about it, I still don't really feel like an expert because this is just -- I always want to decenter my voice as an expert because I'm just feeling this out like everyone else. But in my experience, social media and anxiety are connected, you know, or social media exacerbates anxious feelings. It exacerbates the human condition.",
"直美：我總是想先聲明一句：即使我寫過相關的東西，我仍然不覺得自己是個專家，因為這實在只是——我一直想把自己作為「專家」的聲音放到次要的位置，因為我和大家一樣，都只是在摸索自己的感受。但就我的經驗而言，社交媒體與焦慮是相連的，你知道，或者說，社交媒體會加劇焦慮的情緒。它令人的處境惡化。"],
["And so things that we may have insecurities and anxieties around, like, you know, our relationships, our bodies, our work, the things that make up our sense of self, I think the anxiety we feel or we can feel when we use social media can sometimes act as a marker for things that show us where we need to do work or where we feel insecure. And sometimes it's just a message being reflected back to us. And also, like I said, social media exacerbates the human condition. You know, as humans, I think we so often just want to be loved and cared for and seen and adored or just acknowledged. So social media has also become, you know, our main mode of communication, our method of work. Some of those things, those lines can start to become very blurred.",
"於是，那些讓我們感到不安和焦慮的事物，比方說我們的人際關係、我們的身體、我們的工作，這些構成我們自我認同感的東西，我認為我們在使用社交媒體時所感到、或可能感到的焦慮，有時可以成為一種標記，提示我們哪裏需要下功夫，或哪裏令我們感到不安。有時候，那只是一種被反射回我們身上的訊息。而且正如我所說，社交媒體令人的處境惡化。你知道，作為人類，我認為我們太常只是渴望被愛、被關心、被看見、被愛慕，或只是被認可。於是社交媒體也成了我們主要的溝通方式、我們的工作方式。這其中有些界線，就開始變得非常模糊了。"],
["CSB: Absolutely. Yeah, and in addition to making lives look shiny and perfect, social media also seems to fuel a lot of FOMO, or fear of missing out. And I'm curious what you'd suggest for people who experience a lot of anxiety from seeing videos and images of other people having a ton of fun and, you know, not knowing how to deal with that.",
"克洛：確實如此。是的，除了把生活修飾得光鮮亮麗之外，社交媒體似乎也在助長很多「FOMO」，也就是害怕錯過的心理。我很好奇，對於那些看着別人影片和照片中總是玩得很盡興、卻不知該如何處理這種焦慮的人，你會有甚麼建議？"],
["NS: I think, like I said slightly earlier, the feelings of anxiety when they come up, like, what is that message, you know, taking that step back and being, like, why do I feel this way? Why is this making me feel like this? And kind of reading into it.",
"直美：我認為，正如我稍早所說，當焦慮的情緒湧現時，要想想那到底傳遞了甚麼訊息，你知道，就是退後一步，問自己：我為甚麼會有這種感受？為甚麼這件事會令我這樣？然後去細細解讀它。"],
["And in my personal experience, the thing that works for me is just taking a step back, taking a moment, you know, if something is making me feel bad, for example, if social media -- if we thought of it as a substance, for example, if something was making you feel bad, what would you do about it? Would you stop using it? You know, I think there's levels to this because sometimes, you know, we may have work now that is so intertwined with social media and it can't just be like, oh, stop using it.",
"而就我個人的經驗，對我管用的方法就是退一步、緩一緩。你知道，如果有甚麼東西令我難受，比方說，如果社交媒體——假如我們把它當成一種物質來看，例如，如果某樣東西令你難受，你會怎麼辦？你會停用它嗎？我覺得這件事是有層次的，因為有時候，我們現在的工作跟社交媒體密不可分，不可能一句「哦，停用它」就停用。"],
["And I know that there's a spectrum. And I'm also navigating this constantly myself when as a public-facing person, my job is so intertwined with social media and it's something I want to do less and less.",
"我也知道這其中有一道光譜。作為一個公眾人物，我自己也在不斷摸索：我的工作與社交媒體糾纏不清，而這正是我愈來愈想少做的事。"],
["So I'm navigating that kind of boundary for me all the time. So it's just negotiating, sometimes it's not as clear cut, you know, it may for you start as take the weekends off, or you know, I actually personally most of the time don't have social media on my phone. And just when I have to do something for work, that's when I interact with it, especially this year that's been so heavy, you know, and where there is no “off” button and every new day bringing such bad news, like, I'm a very sensitive person, so I have to do the things I know that I need to take care of myself, which is not scroll.",
"所以我無時無刻不在為自己摸索那條界線。這其實就是一種拉鋸，有時並非一刀兩斷那麼分明，你知道，對你來說也許可以先從過一個不上網的週末開始。實際上我本人大部分時間手機裏都沒有社交媒體軟件，只有在工作必須時才會用它，尤其是今年這麼沉重的一年，你知道，根本沒有「關機」鍵，而且每天都帶來這麼糟糕的消息。我是個非常敏感的人，所以我必須去做那些我知道對照顧好自己有益的事，那就是——不刷手機。"],
["Also, I've had an injury in my hand, which means I can't actually scroll, so I'm like, “This is a sign! I'm just not supposed to be interacting like that right now.” So just listening and knowing that you don't have to fall under the pressure.",
"而且，我的手受了傷，這意味着我根本沒法刷手機，於是我就想：「這是一個徵兆！此刻我就不該那樣去互動。」所以就去傾聽自己，並且明白你其實無需屈服於壓力。"],
["Like, I think so often we think that if we don't post, we don't exist. Our existence, you know - we only exist when other people see us existing. Like, that, that whole line, like, “Oh, if you didn't post about it, it didn't happen.” That concept. We've started to internalize, you know, especially my generation of millennials, gen-Z, like, if you didn't post it, it didn't happen.",
"我覺得我們太常認為，如果不發帖，自己就不存在了。我們的存在，你知道——只有當別人看見我們存在時，我們才算存在。就像那整套說法，好像「哦，如果你沒有把它發出來，它就等於沒發生過」，就是這種觀念。我們已經開始把它內化，尤其是我這一代千禧世代、Z 世代，就像，如果你沒發帖，事情就沒發生過。"],
["And so it's just like going back and being like, OK, is that true? Why do I feel the need to share this? And asking those questions. And that's what I do. So like I said, I'm not an expert, I too I'm working this out and every day feels totally different. But asking those questions is a great place to start.",
"所以就得退回來，問問自己：好吧，這是真的嗎？我為甚麼會覺得需要分享這件事？就是去提出這些問題。我就是這麼做的。所以就像我說的，我不是甚麼專家，我自己也在摸索，而且每一天的感受都截然不同。但提出這些問題，就是一個很好的起點。"],
["CSB: Thank you for that. So we have a question from the audience. Let's bring that up. OK, so related to this, from Facebook, “What question should we be asking ourselves before we post on social media?”",
"克洛：謝謝你的分享。我們有一個來自觀眾的提問，我們把它放出來吧。好，這是相關的問題，來自 Facebook：「在我們發帖到社交媒體之前，應該先問自己甚麼問題呢？」"],
["NS: So I like to ask myself, like, why do I want to share this right now? Is this something -- as a person that has grown up on the internet, on social media, so often how I validated myself and my sense of self was posting something and people reacting to it. And I think that's just very murky territory. I think like, you know, why do I feel the need to share this? Is this something that feels also private to me?",
"直美：我會問自己：我現在為甚麼想分享這件事？會不會是——作為一個在互聯網、在社交媒體上長大的人，我常常是透過發帖、再看別人的反應來肯定自己和自己的自我價值。我覺得這是一個非常曖昧不清的領域。我會想，你知道，我為甚麼會覺得需要分享這件事？這會不會其實也是我的私事？"],
["You know, in my opinion, on whether, and I guess, you know, I have not the biggest social media following, but a social media following, that sometimes, when I'm like, does that person, for me, does my family member want to be shown online, for example, like, or is this a private moment? I think navigating, like, do I feel not good about myself right now and is posting a picture of myself looking, like, hot, or whatever the equivalent of looking really happy -- I think sometimes so often what we post about the things that we are yearning for, whether that's attention, love, craving.",
"你知道，在我看來，我的社交媒體粉絲雖然不算最多，但也有一定數量。有時候我會想，比方說，那個人、我的家人，願不願意被我放到網上展示出來？又或者說，這算不算是私人時刻？我覺得，這種拿捏就在於——我是不是此刻對自己感覺不好，於是就發一張自己看起來很「亮眼」、或任何看似很快樂的照片？我覺得，我們發帖的內容，很多時候其實反映了我們內心所渴望的東西，無論那是關注、愛，還是渴求。"],
["And I think there's deeper underlying messages behind posting sometimes, you know, and that it is a projection of the things that we want in our lives, for example, posting photos of people you want better relationships with or, you know, there's a big spectrum of experience. But for me, I just try to ask myself, why do I feel the need to make this public right now? Is this really something that I am proud of? And it's no critique. This is really questions that are just a gauge where I'm at or where someone else is at with it. Like, is this something that actually I just need to pay attention to in my own life privately, or like, this is something I should be working on or thinking about, or there's just deeper questions about context, that I think, that are important.",
"我認為，發帖背後有時藏着更深層的訊息，你知道，它是我們生活中所渴望之事物的一種投射。例如，發布一些你想與之改善關係的人的照片；當然，這其中的經驗五花八門。但對我而言，我只是試着問自己：我為甚麼會覺得此刻需要把這件事公開？這真的是我引以為傲的事嗎？這並不是批評，這些問題只是用來衡量我自己、或別人此刻的狀態。比如，這其實是不是一件我只需要在自己私人生活裏去留意的事？又或者，這是我應該去努力或思考的事？還是說，這背後牽涉到更深層、關乎脈絡的問題？我認為這些問題都很重要。"],
["CSB: Yeah, yeah. And I think as we're now at our final question, which is something that I think is related to what you're saying around when to post or not to post, but from a different angle, which is, you know, a lot of people have anxiety about whether or not to post their social justice activism on their accounts and regardless of the activism they might be already doing outside of social media, right? And some people just find it performative. But at the same time, there was a fear of looking apathetic if people are not posting about social justice on social media. So how do you suggest people deal with that anxiety and think about that?",
"克洛：是的，是的。我想我們現在來到最後一個問題，這問題和你剛才談到的「何時發帖、何時不發」有關，但角度有所不同：你知道，很多人會為了要不要在自己的帳號上發布聲援社會正義的內容而焦慮，儘管他們在社交媒體以外可能早已在參與相關的行動，對吧？有些人覺得這不過是裝腔作勢。但與此同時，人們又害怕：如果不在社交媒體上為社會正義發聲，就會顯得自己很冷漠。那麼，你會怎樣建議大家去應對這種焦慮、去思考這件事呢？"],
["NS: I mean, that's definitely an anxiety of our generation, right? Anxieties around posting about social justice. I think the big question here is asking ourselves, like, what am I doing in my own life? You know, and again, there is a spectrum, because there's a lot of people who are sharing a lot of important information via social media. So you have, like, organizers and then everybody else. But if you are -- Once again, you know, I can't speak for everybody, but just I think it's -- I read this quote by an activist in Oregon, a lifetime organizer called Grace Lee Boggs, and she said that, you know, that a lot of times in our lives we don't prioritize the importance of self-reflection and revolution. And I think, you know, we so care about optics. We don't want people to think that we are racists, sizeist, sexist, etc.",
"直美：我是說，這絕對是我們這一代人的焦慮，對吧？就是那種關於「要不要發帖談社會正義」的焦慮。我覺得這裏最大的問題，是要問問自己：我在自己的生活中究竟做了些甚麼？你知道，這裏同樣有一道光譜，因為有很多人正透過社交媒體分享大量重要的資訊。所以會有組織者，然後是其他所有人。但如果你是——再說一次，你知道，我不能代表所有人，但我認為——我讀過美國俄勒岡州一位活動家的一句話，她是一位終身的社運組織者，叫葛蕾絲．李．博格斯。她說，你知道，我們的生命裏很多時候都沒有把自我反省與變革的重要性放在首位。而我認為，你知道，我們太在意觀感了。我們不想別人覺得我們是種族主義者、身材歧視者、性別歧視者等等。"],
["But to not create and redo this kind of harm in the world, we need to understand and really reflect on these systems that we've all internalized to some effect. So to understand, like, where am I on the spectrum? How do I benefit? All of these things actually really take time and deep, you know, self-reflection and work. And that kind of questioning, I think, is something that I find it helpful to be offline because I'm just listening to what everybody else is saying.",
"但若要避免在這個世界上製造、重演這一類傷害，我們就需要去理解、並真正反思那些我們或多或少都已經內化了的體制。所以要去弄清楚，比如：我在這道光譜上處於哪個位置？我從中得到甚麼好處？所有這些，其實都需要時間，也需要深入的自我反省和努力。而我覺得，做這種自我叩問時，離線反而是有幫助的，因為（若一直在線）我就只是在聽別人在說甚麼。"],
["Like, are these my thoughts and my feelings or am I just internalizing what other people are just shouting into the atmosphere and into the internet? I think, there's moments where obviously, a lot of the uprisings in June would not have happened if it wasn't for the information that was shared and that action, of course, was so important. But I think there's different phases, you know. And when it's just about shame and optics, that's not how we change the world. For us to change the world, we need to inhabit and act on these reflections.",
"比如，這些究竟是我自己的想法和感受，還是我只是把別人朝着這個氛圍、朝着互聯網高喊的東西內化了進來？我認為，顯然有些時刻——如果不是因為有人分享了那些資訊，六月裏許多的抗爭運動根本不會發生，而那樣的行動當然非常重要。但我認為，事情是有不同階段的，你知道。而當它只剩下羞辱和觀感時，那並不是我們改變世界的方式。若要改變世界，我們就需要把這些反思真正活出來、並付諸行動。"],
["So I think there are again, more questions to ask ourselves, like, do I just not want people to think that I do this? And often we are in echo chamber of the people who follow us and people we follow, right? So a lot of the times we're just sharing and shouting into the atmosphere of people who have the same ideals as us. And that energy can be used in a different way. And also sometimes inhibits, I think, real harder conversations from happening, because I think social media isn't often an intimate enough of a space to be able to ask each other questions that we're afraid to ask.",
"所以我認為，我們又有了更多要問自己的問題，比如：我是不是只是不想讓別人以為這件事是我做的？而我們往往身處一個回音室裏，全是關注我們的人、以及我們所關注的人，對吧？所以很多時候，我們只是在向那些和自己抱持相同理念的人分享、吶喊。而那股能量其實可以用在別的地方。我也認為，這有時反而會妨礙真正更艱難的對話發生，因為我覺得社交媒體往往算不上是一個夠親密的空間，讓我們可以彼此提出那些我們不敢問的問題。"],
["Or mistakes, it's not favorable to making mistakes anymore, which is my critique and sadness about social media. You know, our biggest fear is being called out for something. But this call-out culture, sometimes, not always, I understand its role and place in society, but sometimes doesn't allow for us to have more engaged conversations around these systems that we've internalized. And we all make mistakes and we all have to learn and sometimes it doesn't allow for that to happen.",
"又或者說是犯錯——如今犯錯已經不再被容許，這正是我對社交媒體的批評與難過之處。你知道，我們最大的恐懼，就是因為某件事而被公開指責。但這種「聲討文化」，有時候（並非總是如此）——我明白它在社會上有其角色和位置，但它有時候會令我們沒法就這些已被內化的體制展開更投入的對話。我們每個人都會犯錯，每個人都需要學習，而它有時候並不容許這樣的事發生。"],
["CSB: Yeah, yeah. Well, I think that's beautifully said and we've come to the end of our time here. But I am so grateful to you for this conversation, Naomi, and thank you for sharing all this. I'll talk to you soon. Take care.",
"克洛：是的，是的。嗯，我覺得你說得非常好，而我們的時間也到這裏了。但我真的非常感謝你參與這場對話，直美，也謝謝你分享這一切。我們很快再聊。保重。"],
["NS: Thank you, Cloe and everyone. Much love.",
"直美：謝謝你，克洛，也謝謝大家。愛你們。"]
]

function addPoints(n){ if(n<=0) return; STATE.points+=n; toast(`+${n} pts`, true); updateHud(); }
function awardBest(id, ptsNow){ const prev=STATE.best[id]||0; if(ptsNow>prev){ addPoints(ptsNow-prev); STATE.best[id]=ptsNow; save(); } }
function unlock(id){ if(STATE.badges.includes(id)) return; STATE.badges.push(id); STATE.points+=25; save(); updateHud(); celebrate(BADGE_MAP[id]); }
function toast(text, pts){ const w=document.getElementById("toasts"); const t=document.createElement("div"); t.className="toast"; t.innerHTML=pts?`<span class="pts">${text}</span>`:text; w.appendChild(t); setTimeout(()=>{ t.style.transition="opacity .4s"; t.style.opacity="0"; setTimeout(()=>t.remove(),400); },1400); }
function updateHud(){ const {cur}=levelFor(STATE.points); document.getElementById("hudLvl").textContent=cur[1]; document.getElementById("hudPts").textContent=STATE.points; document.getElementById("hudBadges").textContent="🏅 "+STATE.badges.length; }

function celebrate(b){ if(!b)return; celebQueue.push(b); if(celebQueue.length===1) showCeleb(); }
function showCeleb(){ const b=celebQueue[0]; if(!b)return; const o=document.getElementById("celebOverlay");
  o.innerHTML=`<div class="celebrate"><div class="cico">${b.ico}</div><h2>🎉 Badge unlocked!</h2>
    <div class="cname">${b.name}<span class="zhhelp"> ${b.zh}</span></div>
    <div class="cdesc">${b.desc} · +25 pts</div>
    <button class="btn btn-gold" onclick="nextCeleb()">Awesome! 太好了</button></div>`;
  o.classList.add("show"); }
function nextCeleb(){ celebQueue.shift(); const o=document.getElementById("celebOverlay"); if(celebQueue.length){showCeleb();} else {o.classList.remove("show"); o.innerHTML="";} }
function openBadges(){
  const {cur,next}=levelFor(STATE.points);
  const pct=next?Math.min(100,Math.round((STATE.points-cur[0])/(next[0]-cur[0])*100)):100;
  const nextTxt=next?`<b>${next[1]}</b> in ${next[0]-STATE.points} pts`:"Top level reached 👑";
  const grid=BADGES.map(b=>{ const got=STATE.badges.includes(b.id);
    return `<div class="badge ${got?'unlocked':'locked'}"><div class="ico">${b.ico}</div><div class="bname">${got?'':'🔒 '}${b.name}<span class="zhhelp"><br>${b.zh}</span></div><div class="bdesc">${b.desc}<span class="zhhelp"><br>${b.dzh}</span></div></div>`;
  }).join("");
  const o=document.getElementById("badgeOverlay");
  o.innerHTML=`<div class="modal"><span class="modal-close" onclick="closeBadges()">✕</span>
    <h2>${cur[1]} · ${STATE.points} pts</h2>

  o.classList.add("show");
}

const HUB_DECK=[];
function shuffleDeck(){
  const pool=[];
  TALKS.forEach((t,ti)=>t.vocab.slice(0,8).forEach(v=>pool.push({w:v.w,pos:v.pos,zh:v.zh,en:v.en,talk:ti+1})));
  // Fisher-Yates
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  const pick=pool.slice(0,12);
  const wrap=document.getElementById("hubDeck");
  wrap.innerHTML=pick.map((c,k)=>`<div class="flash" id="hf-${k}" onclick="this.classList.toggle('flipped')"><div class="flash-inner">
    <div class="flash-face flash-front"><div class="w">${c.w}</div><div class="pos">${c.pos}</div><div class="hint">Talk ${c.talk} · tap</div></div>
    <div class="flash-face flash-back"><div class="zh-m">${c.zh}</div><div class="en-m">${c.en}</div></div></div></div>`).join("");
  document.getElementById("hubDeckInfo").textContent=`${pick.length} cards · from ${TALKS.length} talks`;
  awardBest("hubshuffle",5); pointsCheck();
}
function openHub(){ document.getElementById("view-home").style.display="none"; TALKS.forEach((t,k)=>document.getElementById("view-"+k).style.display="none"); const h=document.getElementById("view-hub"); h.style.display="block"; if(!document.getElementById("hubDeck").children.length) shuffleDeck(); window.scrollTo(0,0); }

/* ---------- MCQ ---------- */
let qSeq=0;
const MCQ_HANDLERS={};
function mcq(qObj, exportLabel, onCorrect){
  const id="q"+(qSeq++); MCQ_HANDLERS[id]={a:qObj.a,onCorrect};
  const optsHtml=qObj.opts.map((o,k)=>`<button class="opt" onclick="answerMCQ('${id}',${k})">${String.fromCharCode(65+k)}. ${o}</button>`).join("");
  return `<div class="q" id="${id}" data-answered="0" data-result="" data-label="${exportLabel}"><div class="qt">${qObj.q}</div><div class="opts">${optsHtml}</div><div class="fb"></div></div>`;
}
function answerMCQ(id,chosen){
  const q=document.getElementById(id); if(q.dataset.answered==="1")return;
  const h=MCQ_HANDLERS[id]; const correct=h.a; q.dataset.answered="1";
  q.querySelectorAll(".opt").forEach((b,k)=>{ b.disabled=true; if(k===correct)b.classList.add("correct"); if(k===chosen&&chosen!==correct)b.classList.add("wrong"); });
  const fb=q.querySelector(".fb");
  if(chosen===correct){ q.dataset.result="correct"; fb.innerHTML='✅ Correct!<span class="zhhelp"> 答對了！</span>'; fb.className="fb show good"; }
  else{ q.dataset.result="wrong"; fb.innerHTML='❌ Not quite — the answer is '+String.fromCharCode(65+correct)+'.<span class="zhhelp"> 再聽一次那部分！</span>'; fb.className="fb show bad"; }
  STATE.mcq[id]=chosen; save(); if(h.onCorrect) h.onCorrect(chosen===correct);
}
function replayMCQ(id){
  const chosen=STATE.mcq[id]; if(chosen===undefined)return;
  const q=document.getElementById(id); if(!q)return; const h=MCQ_HANDLERS[id]; const correct=h.a; q.dataset.answered="1";
  q.querySelectorAll(".opt").forEach((b,k)=>{ b.disabled=true; if(k===correct)b.classList.add("correct"); if(k===chosen&&chosen!==correct)b.classList.add("wrong"); });
  const fb=q.querySelector(".fb");
  if(chosen===correct){ q.dataset.result="correct"; fb.innerHTML='✅ Correct!<span class="zhhelp"> 答對了！</span>'; fb.className="fb show good"; }
  else{ q.dataset.result="wrong"; fb.innerHTML='❌ Not quite — the answer is '+String.fromCharCode(65+correct)+'.'; fb.className="fb show bad"; }
}
